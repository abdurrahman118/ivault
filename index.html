<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#7c6fff">
<meta name="description" content="iVault - Smart Device Shop Manager">
<title>iVault — Device Shop Manager</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0d0d14;color:#e8e8f0;min-height:100vh}
.screen{display:none;min-height:100vh}
.screen.active{display:flex}
#authScreen{align-items:center;justify-content:center;background:linear-gradient(135deg,#0d0d14,#1a1a2e);padding:16px}
.auth-box{width:100%;max-width:360px;background:#16162a;border:1px solid #2a2a45;border-radius:16px;padding:28px}
.auth-logo{text-align:center;margin-bottom:20px}
.auth-logo h1{font-size:24px;font-weight:700;color:#7c6fff}
.auth-logo p{font-size:11px;color:#555;margin-top:3px}
.auth-tabs{display:flex;margin-bottom:18px;border:1px solid #2a2a45;border-radius:8px;overflow:hidden}
.auth-tab{flex:1;padding:8px;border:none;background:none;color:#555;font-size:12px;cursor:pointer}
.auth-tab.active{background:#7c6fff;color:#fff}
.field{margin-bottom:11px}
.field label{font-size:10px;color:#777;display:block;margin-bottom:4px}
.field input{width:100%;padding:9px 11px;border:1px solid #2a2a45;border-radius:8px;font-size:13px;background:#1e1e35;color:#e8e8f0;outline:none}
.field input:focus{border-color:#7c6fff}
.btn-auth{width:100%;padding:10px;background:#7c6fff;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-top:2px}
.auth-msg{font-size:11px;text-align:center;margin-top:8px;min-height:14px}
.auth-msg.err{color:#ff6b6b}.auth-msg.ok{color:#48bb78}
#appScreen{flex-direction:row}
.sidebar{width:175px;min-width:175px;background:#16162a;border-right:1px solid #2a2a45;display:flex;flex-direction:column;height:100vh;position:sticky;top:0;transition:transform .25s;z-index:150}
.logo{padding:13px 12px;border-bottom:1px solid #2a2a45}
.logo h2{font-size:14px;font-weight:700;color:#7c6fff}
.logo span{font-size:10px;color:#444}
.nav{flex:1;padding:5px 0;overflow-y:auto}
.nb{width:100%;padding:9px 12px;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;color:#555;text-align:left;border-left:2px solid transparent;transition:all .15s}
.nb:hover{color:#aaa;background:#1e1e35}
.nb.active{color:#7c6fff;background:#1e1e3580;border-left-color:#7c6fff}
.user-info{padding:10px 12px;border-top:1px solid #2a2a45}
.user-info .uname{font-size:11px;font-weight:600;color:#ccc}
.user-info .uemail{font-size:10px;color:#444;margin-top:1px;word-break:break-all}
.btn-logout{font-size:10px;color:#ff6b6b;background:none;border:none;cursor:pointer;padding:0;margin-top:4px}
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:200;background:#7c6fff;border:none;border-radius:8px;padding:8px 10px;color:#fff;font-size:16px;cursor:pointer}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99}
.main{flex:1;overflow-y:auto;padding:18px;background:#0d0d14;min-width:0}
.pt{font-size:17px;font-weight:600;color:#e8e8f0;margin-bottom:14px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.btnp{padding:7px 12px;background:#7c6fff20;color:#7c6fff;border:1px solid #7c6fff50;border-radius:7px;font-size:11px;cursor:pointer;font-weight:500}
.btng{padding:7px 12px;background:#48bb7820;color:#48bb78;border:1px solid #48bb7850;border-radius:7px;font-size:11px;cursor:pointer;font-weight:500}
.btnprint{padding:5px 9px;background:#60a5fa20;color:#60a5fa;border:1px solid #60a5fa50;border-radius:6px;font-size:10px;cursor:pointer}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.metric{background:#16162a;border:1px solid #2a2a45;border-radius:10px;padding:11px}
.metric .lbl{font-size:10px;color:#555;margin-bottom:3px}
.metric .val{font-size:17px;font-weight:600}
.val.blue{color:#60a5fa}.val.green{color:#48bb78}.val.amber{color:#f6ad55}.val.red{color:#ff6b6b}.val.purple{color:#7c6fff}
.card{background:#16162a;border:1px solid #2a2a45;border-radius:10px;padding:13px;margin-bottom:11px}
.sl{font-size:10px;color:#555;font-weight:500;margin-bottom:7px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.item-row{display:flex;justify-content:space-between;align-items:flex-start;background:#1e1e35;border-radius:8px;padding:10px 12px;margin-bottom:6px;gap:8px}
.item-row .mi{flex:1;min-width:0}
.item-row .iname{font-size:13px;font-weight:500;color:#e0e0f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-row .isub{font-size:10px;color:#444;margin-top:2px}
.item-row .iacts{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.iab{font-size:10px;padding:3px 7px;border-radius:5px;cursor:pointer;border:1px solid #2a2a45;background:none;color:#666}
.iab:hover{background:#2a2a45;color:#ccc}
.badge{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:500;white-space:nowrap}
.bi{background:#60a5fa20;color:#60a5fa}.bg{background:#48bb7820;color:#48bb78}.bam{background:#f6ad5520;color:#f6ad55}.br{background:#ff6b6b20;color:#ff6b6b}.bpu{background:#7c6fff20;color:#7c6fff}
.tabs{display:flex;gap:5px;margin-bottom:11px;flex-wrap:wrap}
.tab{padding:6px 13px;border:1px solid #2a2a45;border-radius:7px;font-size:11px;cursor:pointer;background:none;color:#555}
.tab.active{background:#7c6fff20;color:#7c6fff;border-color:#7c6fff50}
.search-box{width:100%;padding:8px 10px;border:1px solid #2a2a45;border-radius:7px;font-size:12px;background:#16162a;color:#e8e8f0;margin-bottom:10px;outline:none}
.rt{width:100%;border-collapse:collapse;font-size:11px}
.rt th{text-align:left;padding:7px 5px;color:#444;border-bottom:1px solid #2a2a45;font-size:10px}
.rt td{padding:7px 5px;border-bottom:1px solid #1e1e35;color:#bbb}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:300;padding:12px}
.modal{background:#16162a;border:1px solid #2a2a45;border-radius:14px;padding:18px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:13px;font-weight:600;margin-bottom:12px;color:#e8e8f0}
.mfield{margin-bottom:9px}
.mfield label{font-size:10px;color:#666;display:block;margin-bottom:3px}
.mfield input,.mfield select{width:100%;padding:7px 9px;border:1px solid #2a2a45;border-radius:7px;font-size:12px;background:#1e1e35;color:#e8e8f0;outline:none}
.mfield input:focus,.mfield select:focus{border-color:#7c6fff}
.tf{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.mbtns{display:flex;gap:7px;margin-top:12px}
.bsave{flex:1;padding:9px;background:#7c6fff;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500}
.bcancel{flex:1;padding:9px;border:1px solid #2a2a45;border-radius:8px;background:none;color:#555;cursor:pointer;font-size:12px}
.empty{text-align:center;padding:24px;color:#333;font-size:12px}
.ri{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1e1e35;font-size:11px}
.ri:last-child{border-bottom:none}
.backup-box{background:#1e1e35;border-radius:10px;padding:14px;margin-bottom:12px}
.backup-box h4{font-size:13px;font-weight:600;color:#e8e8f0;margin-bottom:6px}
.backup-box p{font-size:11px;color:#555;margin-bottom:10px;line-height:1.5}
.export-btns{display:flex;gap:8px;flex-wrap:wrap}
@media(max-width:700px){
  .hamburger{display:block}
  .sidebar{position:fixed;left:0;top:0;height:100vh;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .overlay.open{display:block}
  .main{padding:14px;padding-top:54px}
  .metric-grid{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}
  .tf{grid-template-columns:1fr}
  .export-btns{flex-direction:column}
}
</style>
</head>
<body>
<button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- AUTH SCREEN -->
<div id="authScreen" class="screen active">
  <div class="auth-box">
    <div class="auth-logo"><h1>🔐 iVault</h1><p>Smart Device Shop Manager</p></div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuth('login')">Login</button>
      <button class="auth-tab" onclick="switchAuth('signup')">Sign Up</button>
      <button class="auth-tab" onclick="switchAuth('reset')">Reset</button>
    </div>
    <div id="loginForm">
      <div class="field"><label>Email</label><input id="loginEmail" type="email" placeholder="your@email.com"></div>
      <div class="field"><label>Password</label><input id="loginPass" type="password" placeholder="••••••••"></div>
      <button class="btn-auth" onclick="doLogin()">Login to iVault</button>
    </div>
    <div id="signupForm" style="display:none">
      <div class="field"><label>Full Name</label><input id="signupName" placeholder="Ahmed Raza"></div>
      <div class="field"><label>Shop Name</label><input id="signupShop" placeholder="My Device Shop"></div>
      <div class="field"><label>Email</label><input id="signupEmail" type="email" placeholder="your@email.com"></div>
      <div class="field"><label>Password (min 6 chars)</label><input id="signupPass" type="password" placeholder="••••••••"></div>
      <button class="btn-auth" onclick="doSignup()">Create Account</button>
    </div>
    <div id="resetForm" style="display:none">
      <p style="font-size:12px;color:#666;margin-bottom:12px;line-height:1.5">Enter your email and we will send you a password reset link.</p>
      <div class="field"><label>Email</label><input id="resetEmail" type="email" placeholder="your@email.com"></div>
      <button class="btn-auth" onclick="doReset()">Send Reset Email</button>
    </div>
    <div class="auth-msg" id="authMsg"></div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen" class="screen">
  <div class="sidebar" id="sidebar">
    <div class="logo"><h2>🔐 iVault</h2><span>Device Shop Manager</span></div>
    <nav class="nav" id="nav"></nav>
    <div class="user-info">
      <div class="uname" id="sidebarName">—</div>
      <div class="uemail" id="sidebarEmail">—</div>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="main" id="main"><div style="text-align:center;padding:40px;color:#444">Loading...</div></div>
</div>

<script>
const SUPA='https://yfjrrfbfxprrrdeynzez.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmanJyZmJmeHBycnJkZXluemV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjU3NzUsImV4cCI6MjA5NDEwMTc3NX0.Dn4dgxZC2V3p6a-Ng4a8mk8h9J5cj17wUWagE1XFAUI';
const NAV=[
  {id:'dashboard',icon:'⊞',label:'Dashboard'},
  {id:'products',icon:'📦',label:'Products'},
  {id:'people',icon:'👥',label:'People'},
  {id:'stock',icon:'🚚',label:'Stock'},
  {id:'billing',icon:'🧾',label:'Billing'},
  {id:'expenses',icon:'💸',label:'Expenses'},
  {id:'repairs',icon:'🔧',label:'Repairs'},
  {id:'reports',icon:'📊',label:'Reports'},
  {id:'backup',icon:'☁️',label:'Backup & Export'},
  {id:'settings',icon:'⚙️',label:'Settings'}
];
let CU=null,CS=null;
let ST={tab:'dashboard',peopleTab:'customers',search:'',editId:null,form:{},newBill:{customer:'',items:[{name:'',qty:1,cost:0,price:''}]},billDetail:null};
let D={products:[],customers:[],suppliers:[],bills:[],expenses:[],repairs:[],stockPurchases:[],settings:null};

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

async function api(method,table,body=null,match=null){
  let url=`${SUPA}/rest/v1/${table}`;
  const h={'Content-Type':'application/json','apikey':KEY,'Authorization':`Bearer ${CS?.access_token||KEY}`,'Prefer':'return=representation'};
  const q=[];
  if(method==='GET') q.push('select=*');
  if(match) q.push(match);
  if(q.length) url+='?'+q.join('&');
  const r=await fetch(url,{method,headers:h,body:body?JSON.stringify(body):null});
  if(!r.ok){console.error(table,await r.text());return null;}
  const t=await r.text();return t?JSON.parse(t):[];
}

async function authCall(action,email,pass,meta={}){
  const r=await fetch(`${SUPA}/auth/v1/${action}`,{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY},body:JSON.stringify({email,password:pass,...(action==='signup'?{data:meta}:{})})});
  return r.json();
}

function switchAuth(m){
  ['login','signup','reset'].forEach(x=>{document.getElementById(x+'Form').style.display=x===m?'block':'none';});
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',i===['login','signup','reset'].indexOf(m)));
  setMsg('','');
}

function setMsg(msg,type){const el=document.getElementById('authMsg');el.textContent=msg;el.className='auth-msg'+(type?' '+type:'');}

async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!email||!pass) return setMsg('Fill all fields','err');
  setMsg('Logging in...','');
  const res=await authCall('token?grant_type=password',email,pass);
  if(res.error) return setMsg(res.error.message||'Login failed','err');
  CS=res;CU=res.user;await startApp();
}

async function doSignup(){
  const name=document.getElementById('signupName').value.trim();
  const shop=document.getElementById('signupShop').value.trim();
  const email=document.getElementById('signupEmail').value.trim();
  const pass=document.getElementById('signupPass').value;
  if(!name||!shop||!email||!pass) return setMsg('Fill all fields','err');
  if(pass.length<6) return setMsg('Password min 6 chars','err');
  setMsg('Creating account...','');
  const res=await authCall('signup',email,pass,{full_name:name,shop_name:shop});
  if(res.error) return setMsg(res.error.message||'Signup failed','err');
  if(res.session){
    CS=res.session;CU=res.user;
    await api('POST','settings',{user_id:CU.id,company_name:shop,address:'',phone:'',email,bank1_name:'HBL',bank1_acc:'',bank1_title:shop,bank2_name:'Meezan Bank',bank2_acc:'',bank2_title:shop});
    await startApp();
  } else setMsg('Account created! Check email to confirm then login.','ok');
}

async function doReset(){
  const email=document.getElementById('resetEmail').value.trim();
  if(!email) return setMsg('Enter your email','err');
  setMsg('Sending...','');
  const r=await fetch(`${SUPA}/auth/v1/recover`,{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY},body:JSON.stringify({email})});
  const res=await r.json();
  if(res.error) return setMsg(res.error.message||'Failed','err');
  setMsg('Reset email sent! Check your inbox.','ok');
}

async function doLogout(){
  await fetch(`${SUPA}/auth/v1/logout`,{method:'POST',headers:{'apikey':KEY,'Authorization':`Bearer ${CS?.access_token}`}});
  CU=null;CS=null;
  D={products:[],customers:[],suppliers:[],bills:[],expenses:[],repairs:[],stockPurchases:[],settings:null};
  document.getElementById('authScreen').classList.add('active');
  document.getElementById('appScreen').classList.remove('active');
}

async function startApp(){
  document.getElementById('authScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  document.getElementById('sidebarName').textContent=CU.user_metadata?.full_name||CU.email;
  document.getElementById('sidebarEmail').textContent=CU.email;
  renderNav();await loadAll();renderMain();
}

async function loadAll(){
  const q=`user_id=eq.${CU.id}&order=created_at.desc`;
  const [a,b,c,d,e,f,g,h]=await Promise.all([
    api('GET','products',null,q),api('GET','customers',null,q),api('GET','suppliers',null,q),
    api('GET','bills',null,q),api('GET','expenses',null,q),api('GET','repairs',null,q),
    api('GET','stock_purchases',null,q),api('GET','settings',null,`user_id=eq.${CU.id}`)
  ]);
  D.products=a||[];D.customers=b||[];D.suppliers=c||[];D.bills=d||[];
  D.expenses=e||[];D.repairs=f||[];D.stockPurchases=g||[];
  D.settings=h&&h[0]?h[0]:{company_name:'iVault',address:'',phone:'',email:'',bank1_name:'HBL',bank1_acc:'',bank1_title:'',bank2_name:'Meezan Bank',bank2_acc:'',bank2_title:''};
}

const fmt=n=>'Rs. '+Number(n||0).toLocaleString();
const today=()=>new Date().toISOString().split('T')[0];

function renderNav(){
  document.getElementById('nav').innerHTML=NAV.map(n=>`<button class="nb${ST.tab===n.id?' active':''}" onclick="setTab('${n.id}')">${n.icon} ${n.label}</button>`).join('');
}

function setTab(t){
  ST.tab=t;ST.search='';renderNav();renderMain();
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function renderMain(){
  const pages={dashboard:rDash,products:rProducts,people:rPeople,stock:rStock,billing:rBilling,expenses:rExpenses,repairs:rRepairs,reports:rReports,backup:rBackup,settings:rSettings};
  document.getElementById('main').innerHTML=(pages[ST.tab]||rDash)();
}

function rDash(){
  const ts=D.products.reduce((a,p)=>a+p.stock,0);
  const rev=D.bills.reduce((a,b)=>a+Number(b.total),0);
  const prof=D.bills.reduce((a,b)=>a+Number(b.profit),0);
  const exp=D.expenses.reduce((a,e)=>a+Number(e.amount),0);
  const net=prof-exp;
  const low=D.products.filter(p=>p.stock<=2);
  const activeRep=D.repairs.filter(r=>r.status!=='Delivered');
  return`<div class="pt">Dashboard — ${D.settings?.company_name||'iVault'}</div>
  <div class="metric-grid">
    <div class="metric"><div class="lbl">Products</div><div class="val purple">${D.products.length}</div></div>
    <div class="metric"><div class="lbl">Stock units</div><div class="val blue">${ts}</div></div>
    <div class="metric"><div class="lbl">Revenue</div><div class="val green">${fmt(rev)}</div></div>
    <div class="metric"><div class="lbl">Net profit</div><div class="val ${net>=0?'amber':'red'}">${fmt(net)}</div></div>
  </div>
  <div class="metric-grid" style="grid-template-columns:repeat(3,1fr)">
    <div class="metric"><div class="lbl">Expenses</div><div class="val red">${fmt(exp)}</div></div>
    <div class="metric"><div class="lbl">Active repairs</div><div class="val amber">${activeRep.length}</div></div>
    <div class="metric"><div class="lbl">Gross profit</div><div class="val green">${fmt(prof)}</div></div>
  </div>
  <div class="two-col">
    <div class="card"><div class="sl">⚠️ Low stock</div>${low.length===0?'<div class="empty">All stocked ✓</div>':low.map(p=>`<div class="ri"><div><b style="font-size:11px">${p.name}</b><div style="font-size:10px;color:#444">${p.category}</div></div><span class="badge br">${p.stock} left</span></div>`).join('')}</div>
    <div class="card"><div class="sl">🔧 Active repairs</div>${activeRep.length===0?'<div class="empty">No active repairs</div>':activeRep.map(r=>`<div class="ri"><div><b style="font-size:11px">${r.job_id} — ${r.device}</b><div style="font-size:10px;color:#444">${r.customer}</div></div><span class="badge ${r.status==='Ready'?'bg':r.status==='In Progress'?'bam':'br'}">${r.status}</span></div>`).join('')}</div>
  </div>`;
}

function rProducts(){
  const filtered=D.products.filter(p=>[p.name,p.serial,p.imei].some(v=>(v||'').toLowerCase().includes(ST.search.toLowerCase())));
  return`<div class="topbar"><div class="pt" style="margin:0">Products</div><button class="btnp" onclick="openModal('prod',null)">+ Add</button></div>
  <input class="search-box" placeholder="Search by name, serial or IMEI..." value="${ST.search}" oninput="ST.search=this.value;renderMain()">
  ${filtered.length===0?'<div class="empty">No products found</div>':filtered.map(p=>`
    <div class="item-row"><div class="mi">
      <div class="iname">${p.name}</div>
      <div class="isub">${[p.color,p.storage,p.condition].filter(Boolean).join(' · ')} <span class="badge bi">${p.category}</span></div>
      ${p.serial?`<div class="isub">SN: ${p.serial}</div>`:''}${p.imei?`<div class="isub">IMEI: ${p.imei}</div>`:''}
      <div class="iacts"><button class="iab" onclick="openModal('prod',${p.id})">✏️ Edit</button><button class="iab" style="color:#ff6b6b" onclick="delRow('products',${p.id})">🗑</button></div>
    </div><div style="text-align:right;min-width:85px"><div style="font-size:12px;font-weight:600;color:#7c6fff">${fmt(p.cost_price)}</div><div style="font-size:10px;margin-top:2px;color:${p.stock<=2?'#ff6b6b':'#48bb78'}">${p.stock} in stock</div></div></div>`).join('')}`;
}

function rPeople(){
  const isC=ST.peopleTab==='customers';
  return`<div class="pt">Customers & Suppliers</div>
  <div class="tabs">
    <button class="tab${isC?' active':''}" onclick="ST.peopleTab='customers';renderMain()">Customers (${D.customers.length})</button>
    <button class="tab${!isC?' active':''}" onclick="ST.peopleTab='suppliers';renderMain()">Suppliers (${D.suppliers.length})</button>

function exportExcel(){
  const rows=[['iVault Report — '+new Date().toLocaleDateString()],[],['SALES INVOICES'],['Invoice','Customer','Date','Total','Profit']];
  D.bills.forEach(b=>rows.push([b.id,b.customer,b.date,b.total,b.profit]));
  rows.push([],['EXPENSES'],['Date','Category','Description','Amount']);
  D.expenses.forEach(e=>rows.push([e.date,e.category,e.description,e.amount]));
  rows.push([],['PRODUCTS'],['Name','Category','Serial','IMEI','Cost','Stock']);
  D.products.forEach(p=>rows.push([p.name,p.category,p.serial||'',p.imei||'',p.cost_price,p.stock]));
  rows.push([],['REPAIRS'],['Job ID','Customer','Device','Status','Charge']);
  D.repairs.forEach(r=>rows.push([r.job_id,r.customer,r.device,r.status,r.charge]));
  const rev=D.bills.reduce((a,b)=>a+Number(b.total),0);
  const prof=D.bills.reduce((a,b)=>a+Number(b.profit),0);
  const exp=D.expenses.reduce((a,e)=>a+Number(e.amount),0);
  rows.push([],['SUMMARY'],['Total Revenue',rev],['Gross Profit',prof],['Total Expenses',exp],['Net Profit',prof-exp]);
  const csv=rows.map(r=>r.map(c=>JSON.stringify(c??'')).join(',')).join('\n');
  dl('\ufeff'+csv,'text/csv',`iVault_Report_${today()}.csv`);
  alert('Exported! Open the .csv file with Excel or Google Sheets.');
}

function exportJSON(){

function dl(content,type,filename){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=filename;a.click();
}

function manualBackup(){
  exportJSON();
  const now=new Date().toLocaleString();
  localStorage.setItem('ivault_last_backup',now);

  <div class="tot">Total: Rs. ${Number(b.total).toLocaleString()}</div>
  <div class="banks"><b>Bank Details:</b><br>${s.bank1_name||''}: ${s.bank1_acc||''} — ${s.bank1_title||''}<br>${s.bank2_name||''}: ${s.bank2_acc||''} — ${s.bank2_title||''}</div>
  <script>window.print();setTimeout(()=>window.close(),1500);<\/script></body></html>`);
  w.document.close();
}

function openModal(type,id){
  ST.editId=id;ST.form={};
  const maps={prod:'products',cust:'customers',supp:'suppliers',expense:'expenses',repair:'repairs'};
  if(id!==null&&maps[type]) ST.form={...D[maps[type]].find(x=>x.id==id)};
  if(type==='bill') ST.newBill={customer:'',items:[{name:'',qty:1,cost:0,price:''}]};
  const old=document.getElementById('modalWrap');if(old) old.remove();
  const div=document.createElement('div');div.id='modalWrap';
  div.innerHTML=buildModal(type,id);
  document.body.appendChild(div);
  if(type==='bill') setTimeout(refreshBillItems,30);
}

function closeModal(){const el=document.getElementById('modalWrap');if(el)el.remove();}

function buildModal(type,id){
  const isEdit=id!==null;const f=ST.form;const td=today();
  if(type==='bill') return`<div class="modal-ov" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>🧾 New invoice</h3>
    <div class="mfield"><label>Customer name *</label><input id="billCustomer" placeholder="Customer name"></div>
    <div class="sl" style="margin-bottom:6px">Items — product · qty · cost price · sale price</div>
    <div id="billItemsWrap"></div>
    <button onclick="ST.newBill.items.push({name:'',qty:1,cost:0,price:''});refreshBillItems()" style="font-size:11px;color:#7c6fff;background:none;border:none;cursor:pointer;margin-bottom:8px">+ Add item</button>
    <div class="mbtns"><button class="bsave" onclick="saveBill()">Create invoice</button><button class="bcancel" onclick="closeModal()">Cancel</button></div>
  </div></div>`;
  let body='';
  if(type==='prod') body=`<div class="tf">
    <div class="mfield"><label>Product name *</label><input id="f_name" value="${f.name||''}"></div>
    <div class="mfield"><label>Model</label><input id="f_model" value="${f.model||''}"></div>
    <div class="mfield"><label>Brand</label><input id="f_brand" value="${f.brand||'Apple'}"></div>
    <div class="mfield"><label>Category</label><select id="f_category">${['iPhone','iPad','MacBook','Android','Accessory'].map(c=>`<option${(f.category||'iPhone')===c?' selected':''}>${c}</option>`).join('')}</select></div>
    <div class="mfield"><label>Color</label><input id="f_color" value="${f.color||''}"></div>
    <div class="mfield"><label>Storage</label><input id="f_storage" value="${f.storage||''}"></div>
    <div class="mfield"><label>Condition</label><select id="f_condition">${['New','Used','Refurbished'].map(c=>`<option${(f.condition||'New')===c?' selected':''}>${c}</option>`).join('')}</select></div>
    <div class="mfield"><label>Serial</label><input id="f_serial" value="${f.serial||''}"></div>
    <div class="mfield"><label>IMEI</label><input id="f_imei" value="${f.imei||''}"></div>
    <div class="mfield"><label>Cost price (Rs.) *</label><input type="number" id="f_cost_price" value="${f.cost_price||''}"></div>
    <div class="mfield"><label>Stock qty</label><input type="number" id="f_stock" value="${f.stock||0}"></div>
  </div>`;
  else if(type==='cust') body=`<div class="mfield"><label>Name *</label><input id="f_name" value="${f.name||''}"></div><div class="mfield"><label>Phone</label><input id="f_phone" value="${f.phone||''}"></div><div class="mfield"><label>Email</label><input id="f_email" value="${f.email||''}"></div><div class="mfield"><label>City</label><input id="f_city" value="${f.city||''}"></div><div class="mfield"><label>Type</label><select id="f_type"><option${(f.type||'Retail')==='Retail'?' selected':''}>Retail</option><option${f.type==='Wholesale'?' selected':''}>Wholesale</option></select></div>`;
  else if(type==='supp') body=`<div class="mfield"><label>Name *</label><input id="f_name" value="${f.name||''}"></div><div class="mfield"><label>Phone</label><input id="f_phone" value="${f.phone||''}"></div><div class="mfield"><label>Email</label><input id="f_email" value="${f.email||''}"></div><div class="mfield"><label>City</label><input id="f_city" value="${f.city||''}"></div>`;
  else if(type==='stock') body=`<div class="tf"><div class="mfield"><label>Date</label><input type="date" id="f_date" value="${td}"></div><div class="mfield"><label>Supplier</label><input id="f_supplier"></div><div class="mfield"><label>Product *</label><input id="f_product"></div><div class="mfield"><label>Qty *</label><input type="number" id="f_qty"></div><div class="mfield"><label>Cost/unit (Rs.)</label><input type="number" id="f_cost_per_unit"></div></div>`;
  else if(type==='expense') body=`<div class="tf"><div class="mfield"><label>Date</label><input type="date" id="f_date" value="${f.date||td}"></div><div class="mfield"><label>Category</label><select id="f_category">${['Rent','Electricity','Salary','Internet','Transport','Other'].map(c=>`<option${(f.category||'Rent')===c?' selected':''}>${c}</option>`).join('')}</select></div></div><div class="mfield"><label>Description *</label><input id="f_description" value="${f.description||''}"></div><div class="mfield"><label>Amount (Rs.) *</label><input type="number" id="f_amount" value="${f.amount||''}"></div>`;
  else if(type==='repair') body=`<div class="tf"><div class="mfield"><label>Date</label><input type="date" id="f_date" value="${f.date||td}"></div><div class="mfield"><label>Customer *</label><input id="f_customer" value="${f.customer||''}"></div><div class="mfield"><label>Phone</label><input id="f_phone" value="${f.phone||''}"></div><div class="mfield"><label>Device *</label><input id="f_device" value="${f.device||''}"></div></div><div class="mfield"><label>Issue</label><input id="f_issue" value="${f.issue||''}"></div><div class="mfield"><label>Status</label><select id="f_status">${['Pending','In Progress','Ready','Delivered'].map(s=>`<option${(f.status||'Pending')===s?' selected':''}>${s}</option>`).join('')}</select></div><div class="mfield"><label>Charge (Rs.)</label><input type="number" id="f_charge" value="${f.charge||''}"></div><div class="mfield"><label>Notes</label><input id="f_notes" value="${f.notes||''}"></div>`;
  const titles={prod:isEdit?'Edit product':'Add product',cust:isEdit?'Edit customer':'Add customer',supp:isEdit?'Edit supplier':'Add supplier',stock:'Add stock purchase',expense:isEdit?'Edit expense':'Add expense',repair:isEdit?'Edit repair':'New repair job'};
  return`<div class="modal-ov" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>${titles[type]||''}</h3>${body}<div class="mbtns"><button class="bsave" onclick="saveForm('${type}')">${isEdit?'Save changes':'Add'}</button><button class="bcancel" onclick="closeModal()">Cancel</button></div></div></div>`;
}

function refreshBillItems(){
  const wrap=document.getElementById('billItemsWrap');if(!wrap) return;
  wrap.innerHTML=ST.newBill.items.map((item,i)=>`<div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:4px;margin-bottom:5px">
    <input placeholder="Product" value="${item.name}" oninput="ST.newBill.items[${i}].name=this.value" style="padding:6px 7px;border:1px solid #2a2a45;border-radius:6px;font-size:11px;background:#1e1e35;color:#e8e8f0;min-width:0">
    <input type="number" placeholder="Qty" value="${item.qty}" oninput="ST.newBill.items[${i}].qty=Number(this.value)" style="padding:6px 7px;border:1px solid #2a2a45;border-radius:6px;font-size:11px;background:#1e1e35;color:#e8e8f0;min-width:0">
    <input type="number" placeholder="Cost" value="${item.cost||''}" oninput="ST.newBill.items[${i}].cost=Number(this.value)" style="padding:6px 7px;border:1px solid #2a2a45;border-radius:6px;font-size:11px;background:#1e1e35;color:#e8e8f0;min-width:0">
    <input type="number" placeholder="Sale" value="${item.price||''}" oninput="ST.newBill.items[${i}].price=Number(this.value)" style="padding:6px 7px;border:1px solid #2a2a45;border-radius:6px;font-size:11px;background:#1e1e35;color:#e8e8f0;min-width:0">
  </div>`).join('');
}

async function saveForm(type){
  const g=id=>document.getElementById(id)?.value||'';
  const gn=id=>Number(document.getElementById(id)?.value||0);
  const uid=CU.id;let data={},table='',isEdit=ST.editId!==null;
  if(type==='prod'){if(!g('f_name')) return alert('Product name required');data={user_id:uid,name:g('f_name'),model:g('f_model'),brand:g('f_brand'),category:g('f_category'),color:g('f_color'),storage:g('f_storage'),condition:g('f_condition'),serial:g('f_serial'),imei:g('f_imei'),cost_price:gn('f_cost_price'),stock:gn('f_stock')};table='products';}
  else if(type==='cust'){if(!g('f_name')) return alert('Name required');data={user_id:uid,name:g('f_name'),phone:g('f_phone'),email:g('f_email'),city:g('f_city'),type:g('f_type'),purchases:0};table='customers';}
  else if(type==='supp'){if(!g('f_name')) return alert('Name required');data={user_id:uid,name:g('f_name'),phone:g('f_phone'),email:g('f_email'),city:g('f_city'),supplied:0};table='suppliers';}
  else if(type==='stock'){if(!g('f_product')) return alert('Product required');const qty=gn('f_qty'),cpu=gn('f_cost_per_unit');data={user_id:uid,date:g('f_date'),supplier:g('f_supplier'),product:g('f_product'),qty,cost_per_unit:cpu,total:qty*cpu};table='stock_purchases';isEdit=false;}
  else if(type==='expense'){if(!g('f_description')) return alert('Description required');data={user_id:uid,date:g('f_date'),category:g('f_category'),description:g('f_description'),amount:gn('f_amount')};table='expenses';}
  else if(type==='repair'){if(!g('f_customer')||!g('f_device')) return alert('Customer and device required');const jobId=isEdit?ST.form.job_id:`REP-${String(D.repairs.length+1).padStart(3,'0')}`;data={user_id:uid,job_id:jobId,date:g('f_date'),customer:g('f_customer'),phone:g('f_phone'),device:g('f_device'),issue:g('f_issue'),status:g('f_status'),charge:gn('f_charge'),notes:g('f_notes')};table='repairs';}
  const res=isEdit?await api('PATCH',table,data,`id=eq.${ST.editId}`):await api('POST',table,data);
  if(res===null) return alert('Save failed. Try again.');
  closeModal();await loadAll();renderMain();
}

async function saveBill(){
  const customer=document.getElementById('billCustomer')?.value.trim();
  if(!customer) return alert('Customer required');
  const items=ST.newBill.items;
  if(!items[0]?.name) return alert('Add at least 1 item');
  const total=items.reduce((a,i)=>a+Number(i.price)*Number(i.qty),0);
  const cost=items.reduce((a,i)=>a+Number(i.cost)*Number(i.qty),0);
  const num=String(D.bills.length+1).padStart(3,'0');
  const res=await api('POST','bills',{id:`INV-${num}`,user_id:CU.id,customer,date:today(),items,total,profit:total-cost});
  if(res===null) return alert('Failed to create invoice');
  closeModal();await loadAll();renderMain();
}

async function saveSettings(){
  const g=id=>document.getElementById(id)?.value||'';const uid=CU.id;
  const data={company_name:g('s_company_name'),address:g('s_address'),phone:g('s_phone'),email:g('s_email'),bank1_name:g('s_bank1_name'),bank1_acc:g('s_bank1_acc'),bank1_title:g('s_bank1_title'),bank2_name:g('s_bank2_name'),bank2_acc:g('s_bank2_acc'),bank2_title:g('s_bank2_title')};
  const exists=await api('GET','settings',null,`user_id=eq.${uid}`);
  const res=exists&&exists.length>0?await api('PATCH','settings',data,`user_id=eq.${uid}`):await api('POST','settings',{...data,user_id:uid});
  if(res===null) return alert('Save failed');
  await loadAll();alert('Settings saved ✓');
}

async function delRow(table,id){
  if(!confirm('Delete this item?')) return;
  await api('DELETE',table,null,`id=eq.${id}`);
  await loadAll();renderMain();
}
</script>
</body>
</html>
