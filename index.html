<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#7c6fff">
<title>iVault — Device Shop Manager</title>
<style>
:root{
  --bg:#0d0d14;--bg2:#16162a;--bg3:#1e1e35;--border:#2a2a45;
  --text:#e8e8f0;--text2:#aaa;--text3:#666;
  --purple:#7c6fff;--green:#48bb78;--red:#ff6b6b;--amber:#f6ad55;--blue:#60a5fa;
}
.light{
  --bg:#f0f2f8;--bg2:#ffffff;--bg3:#e8eaf2;--border:#d0d4e8;
  --text:#1a1a2e;--text2:#444;--text3:#888;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}
.screen{display:none;min-height:100vh}.screen.active{display:flex}
#authScreen{align-items:center;justify-content:center;background:var(--bg);padding:16px}
.auth-box{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:30px}
.auth-logo{text-align:center;margin-bottom:22px}
.auth-logo h1{font-size:26px;font-weight:800;color:var(--purple)}
.auth-logo p{font-size:12px;color:var(--text3);margin-top:4px}
.auth-tabs{display:flex;margin-bottom:18px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.auth-tab{flex:1;padding:9px;border:none;background:none;color:var(--text3);font-size:13px;cursor:pointer}
.auth-tab.active{background:var(--purple);color:#fff;font-weight:600}
.field{margin-bottom:12px}
.field label{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
.field input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;background:var(--bg3);color:var(--text);outline:none;transition:border .15s}
.field input:focus{border-color:var(--purple)}
.btn-auth{width:100%;padding:12px;background:var(--purple);border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.auth-msg{font-size:12px;text-align:center;margin-top:10px;min-height:16px;font-weight:500}
.auth-msg.err{color:var(--red)}.auth-msg.ok{color:var(--green)}
#appScreen{flex-direction:row}
.sidebar{width:185px;min-width:185px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;transition:transform .25s;z-index:150}
.logo{padding:15px 14px;border-bottom:1px solid var(--border)}
.logo h2{font-size:16px;font-weight:800;color:var(--purple)}
.logo span{font-size:10px;color:var(--text3)}
.nav{flex:1;padding:6px 0;overflow-y:auto}
.nb{width:100%;padding:10px 14px;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:9px;font-size:13px;color:var(--text3);text-align:left;border-left:2px solid transparent;transition:all .15s;font-weight:500}
.nb:hover{color:var(--text);background:var(--bg3)}
.nb.active{color:var(--purple);background:var(--bg3);border-left-color:var(--purple)}
.user-info{padding:12px 14px;border-top:1px solid var(--border)}
.uname{font-size:12px;font-weight:700;color:var(--text)}
.uemail{font-size:10px;color:var(--text3);margin-top:2px;word-break:break-all}
.btn-logout{font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;padding:0;margin-top:5px;font-weight:600}
.hamburger{display:none;position:fixed;top:13px;left:13px;z-index:200;background:var(--purple);border:none;border-radius:8px;padding:8px 11px;color:#fff;font-size:17px;cursor:pointer}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99}
.main{flex:1;overflow-y:auto;padding:20px;background:var(--bg);min-width:0}
.pt{font-size:20px;font-weight:800;color:var(--text);margin-bottom:16px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.btnp{padding:8px 14px;background:rgba(124,111,255,0.15);color:var(--purple);border:1.5px solid rgba(124,111,255,0.4);border-radius:8px;font-size:12px;cursor:pointer;font-weight:600}
.btng{padding:8px 14px;background:rgba(72,187,120,0.15);color:var(--green);border:1.5px solid rgba(72,187,120,0.4);border-radius:8px;font-size:12px;cursor:pointer;font-weight:600}
.btnr{padding:8px 14px;background:rgba(255,107,107,0.15);color:var(--red);border:1.5px solid rgba(255,107,107,0.4);border-radius:8px;font-size:12px;cursor:pointer;font-weight:600}
.btnwa{padding:8px 14px;background:rgba(37,211,102,0.15);color:#25d366;border:1.5px solid rgba(37,211,102,0.4);border-radius:8px;font-size:12px;cursor:pointer;font-weight:600}
.btnprint{padding:5px 10px;background:rgba(96,165,250,0.15);color:var(--blue);border:1.5px solid rgba(96,165,250,0.4);border-radius:6px;font-size:11px;cursor:pointer;font-weight:600}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.metric{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:14px}
.metric .lbl{font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.metric .val{font-size:20px;font-weight:800}
.val.blue{color:var(--blue)}.val.green{color:var(--green)}.val.amber{color:var(--amber)}.val.red{color:var(--red)}.val.purple{color:var(--purple)}
.card{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:15px;margin-bottom:12px}
.sl{font-size:12px;color:var(--text2);font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.item-row{display:flex;justify-content:space-between;align-items:flex-start;background:var(--bg3);border-radius:10px;padding:12px 14px;margin-bottom:8px;gap:8px;border:1px solid var(--border)}
.item-row .mi{flex:1;min-width:0}
.item-row .iname{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-row .isub{font-size:11px;color:var(--text2);margin-top:3px;font-weight:500}
.item-row .iacts{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.iab{font-size:11px;padding:4px 9px;border-radius:6px;cursor:pointer;border:1.5px solid var(--border);background:none;color:var(--text2);font-weight:500}
.iab:hover{background:var(--border);color:var(--text)}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.bi{background:rgba(96,165,250,0.15);color:var(--blue)}
.bg{background:rgba(72,187,120,0.15);color:var(--green)}
.bam{background:rgba(246,173,85,0.15);color:var(--amber)}
.br{background:rgba(255,107,107,0.15);color:var(--red)}
.bpu{background:rgba(124,111,255,0.15);color:var(--purple)}
.tabs{display:flex;gap:6px;margin-bottom:13px;flex-wrap:wrap}
.tab{padding:7px 15px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;background:none;color:var(--text3);font-weight:600}
.tab.active{background:rgba(124,111,255,0.15);color:var(--purple);border-color:rgba(124,111,255,0.4)}
.search-box{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;background:var(--bg2);color:var(--text);margin-bottom:12px;outline:none;font-weight:500}
.search-box:focus{border-color:var(--purple)}
.rt{width:100%;border-collapse:collapse;font-size:12px}
.rt th{text-align:left;padding:8px 6px;color:var(--text2);border-bottom:1.5px solid var(--border);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.rt td{padding:8px 6px;border-bottom:1px solid var(--bg3);color:var(--text);font-weight:500}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:300;padding:14px}
.modal{background:var(--bg2);border:1.5px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:800;margin-bottom:14px;color:var(--text)}
.mfield{margin-bottom:11px}
.mfield label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px;font-weight:600}
.mfield input,.mfield select,.mfield textarea{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg3);color:var(--text);outline:none;font-weight:500}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{border-color:var(--purple)}
.mfield textarea{resize:vertical;min-height:60px}
.tf{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mbtns{display:flex;gap:8px;margin-top:14px}
.bsave{flex:1;padding:10px;background:var(--purple);color:#fff;border:none;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700}
.bcancel{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:9px;background:none;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600}
.empty{text-align:center;padding:28px;color:var(--text3);font-size:13px;font-weight:500}
.ri{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg3);font-size:12px;font-weight:500}
.ri:last-child{border-bottom:none}
.backup-box{background:var(--bg3);border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.backup-box h4{font-size:14px;font-weight:700;color:var(--text);margin-bottom:7px}
.backup-box p{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.6;font-weight:500}
.export-btns{display:flex;gap:8px;flex-wrap:wrap}
.theme-toggle{display:flex;gap:10px;margin-bottom:16px}
.theme-btn{flex:1;padding:14px;border:2px solid var(--border);border-radius:12px;background:none;cursor:pointer;font-size:13px;font-weight:700;color:var(--text2);transition:all .15s}
.theme-btn.active{border-color:var(--purple);color:var(--purple);background:rgba(124,111,255,0.1)}
.suggest-list{background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;max-height:160px;overflow-y:auto;position:absolute;z-index:50;width:100%;top:100%;left:0}
.suggest-item{padding:9px 12px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text);border-bottom:1px solid var(--bg3)}
.suggest-item:hover{background:var(--bg3)}
.suggest-wrap{position:relative}
.unit-row{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px}
.unit-row .unit-title{font-size:12px;font-weight:700;color:var(--purple);margin-bottom:8px}
@media(max-width:700px){
  .hamburger{display:block}
  .sidebar{position:fixed;left:0;top:0;height:100vh;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .overlay.open{display:block}
  .main{padding:14px;padding-top:56px}
  .metric-grid{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}
  .tf{grid-template-columns:1fr}
  .export-btns{flex-direction:column}
}
</style>
</head>
<body>
<button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div id="authScreen" class="screen active">
  <div class="auth-box">
    <div class="auth-logo"><h1>🔐 iVault</h1><p>Smart Device Shop Manager v4</p></div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuth('login')">Login</button>
      <button class="auth-tab" onclick="switchAuth('signup')">Sign Up</button>
      <button class="auth-tab" onclick="switchAuth('reset')">Reset</button>
    </div>
    <div id="loginForm">
      <div class="field"><label>Email</label><input id="loginEmail" type="email" placeholder="your@email.com"></div>
      <div class="field"><label>Password</label><input id="loginPass" type="password" placeholder="••••••••"></div>
      <button class="btn-auth" onclick="doLogin()">Login to iVault</button>
    </div>
    <div id="signupForm" style="display:none">
      <div class="field"><label>Full Name</label><input id="signupName" placeholder="Ahmed Raza"></div>
      <div class="field"><label>Shop Name</label><input id="signupShop" placeholder="My Device Shop"></div>
      <div class="field"><label>Email</label><input id="signupEmail" type="email" placeholder="your@email.com"></div>
      <div class="field"><label>Password (min 6 chars)</label><input id="signupPass" type="password" placeholder="••••••••"></div>
      <button class="btn-auth" onclick="doSignup()">Create Account</button>
    </div>
    <div id="resetForm" style="display:none">
      <p style="font-size:12px;color:var(--text3);margin-bottom:12px;line-height:1.6;font-weight:500">Enter your email and we will send a password reset link.</p>
      <div class="field"><label>Email</label><input id="resetEmail" type="email" placeholder="your@email.com"></div>
      <button class="btn-auth" onclick="doReset()">Send Reset Email</button>
    </div>
    <div class="auth-msg" id="authMsg"></div>
  </div>
</div>

<div id="appScreen" class="screen">
  <div class="sidebar" id="sidebar">
    <div class="logo"><h2>🔐 iVault</h2><span>Device Shop Manager</span></div>
    <nav class="nav" id="nav"></nav>
    <div class="user-info">
      <div class="uname" id="sidebarName">—</div>
      <div class="uemail" id="sidebarEmail">—</div>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="main" id="main"><div style="text-align:center;padding:50px;color:var(--text3);font-size:14px;font-weight:600">Loading iVault...</div></div>
</div>

<script>
const SUPA='https://yfjrrfbfxprrrdeynzez.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmanJyZmJmeHBycnJkZXluemV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjU3NzUsImV4cCI6MjA5NDEwMTc3NX0.Dn4dgxZC2V3p6a-Ng4a8mk8h9J5cj17wUWagE1XFAUI';
const NAV=[
  {id:'dashboard',icon:'⊞',label:'Dashboard'},
  {id:'devices',icon:'📱',label:'Device Catalog'},
  {id:'stock',icon:'🚚',label:'Stock Purchases'},
  {id:'inventory',icon:'🗃️',label:'Inventory'},
  {id:'people',icon:'👥',label:'People'},
  {id:'billing',icon:'🧾',label:'Billing'},
  {id:'expenses',icon:'💸',label:'Expenses'},
  {id:'repairs',icon:'🔧',label:'Repairs'},
  {id:'reports',icon:'📊',label:'Reports'},
  {id:'backup',icon:'☁️',label:'Backup'},
  {id:'settings',icon:'⚙️',label:'Settings'},
];

let CU=null,CS=null,THEME='dark';
let ST={tab:'dashboard',peopleTab:'customers',search:'',editId:null,form:{},newBill:{customer:'',customerId:null,items:[],notes:''},billDetail:null,settingsTab:'company'};
let D={devices:[],stockPurchases:[],inventory:[],customers:[],suppliers:[],bills:[],expenses:[],repairs:[],settings:null};

// THEME
function applyTheme(t){
  THEME=t;
  document.body.classList.toggle('light',t==='light');
  localStorage.setItem('ivault_theme',t);
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

// SUPABASE
async function api(method,table,body=null,match=null){
  let url=`${SUPA}/rest/v1/${table}`;
  const h={'Content-Type':'application/json','apikey':KEY,'Authorization':`Bearer ${CS?.access_token||KEY}`,'Prefer':'return=representation'};
  const q=[];
  if(method==='GET') q.push('select=*');
  if(match) q.push(match);
  if(q.length) url+='?'+q.join('&');
  const r=await fetch(url,{method,headers:h,body:body?JSON.stringify(body):null});
  if(!r.ok){console.error(table,method,await r.text());return null;}
  const t=await r.text();return t?JSON.parse(t):[];
}
async function authCall(action,email,pass,meta={}){
  const r=await fetch(`${SUPA}/auth/v1/${action}`,{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY},body:JSON.stringify({email,password:pass,...(action==='signup'?{data:meta}:{})})});
  return r.json();
}

// AUTH
function switchAuth(m){
  ['login','signup','reset'].forEach(x=>document.getElementById(x+'Form').style.display=x===m?'block':'none');
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',i===['login','signup','reset'].indexOf(m)));
  setMsg('','');
}
function setMsg(msg,type){const el=document.getElementById('authMsg');el.textContent=msg;el.className='auth-msg'+(type?' '+type:'');}

async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!email||!pass) return setMsg('Fill all fields','err');
  setMsg('Logging in...','');
  const res=await authCall('token?grant_type=password',email,pass);
  if(res.error) return setMsg(res.error.message||'Login failed','err');
  CS=res;CU=res.user;await startApp();
}
async function doSignup(){
  const name=document.getElementById('signupName').value.trim();
  const shop=document.getElementById('signupShop').value.trim();
  const email=document.getElementById('signupEmail').value.trim();
  const pass=document.getElementById('signupPass').value;
  if(!name||!shop||!email||!pass) return setMsg('Fill all fields','err');
  if(pass.length<6) return setMsg('Password min 6 chars','err');
  setMsg('Creating account...','');
  const res=await authCall('signup',email,pass,{full_name:name,shop_name:shop});
  if(res.error) return setMsg(res.error.message||'Signup failed','err');
  if(res.session){
    CS=res.session;CU=res.user;
    await api('POST','settings',{user_id:CU.id,company_name:shop,address:'',phone:'',email,bank1_name:'HBL',bank1_acc:'',bank1_title:shop,bank2_name:'Meezan Bank',bank2_acc:'',bank2_title:shop});
    await startApp();
  } else setMsg('Account created! Check email to confirm then login.','ok');
}
async function doReset(){
  const email=document.getElementById('resetEmail').value.trim();
  if(!email) return setMsg('Enter email','err');
  setMsg('Sending...','');
  const r=await fetch(`${SUPA}/auth/v1/recover`,{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY},body:JSON.stringify({email})});
  const res=await r.json();
  if(res.error) return setMsg(res.error.message,'err');
  setMsg('Reset email sent! Check inbox.','ok');
}
async function doLogout(){
  await fetch(`${SUPA}/auth/v1/logout`,{method:'POST',headers:{'apikey':KEY,'Authorization':`Bearer ${CS?.access_token}`}});
  CU=null;CS=null;
  document.getElementById('authScreen').classList.add('active');
  document.getElementById('appScreen').classList.remove('active');
}
async function startApp(){
  document.getElementById('authScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  document.getElementById('sidebarName').textContent=CU.user_metadata?.full_name||CU.email;
  document.getElementById('sidebarEmail').textContent=CU.email;
  const saved=localStorage.getItem('ivault_theme')||'dark';
  applyTheme(saved);
  renderNav();await loadAll();renderMain();
}

// LOAD DATA
async function loadAll(){
  const q=`user_id=eq.${CU.id}&order=created_at.desc`;
  const [a,b,c,d,e,f,g,h,sett]=await Promise.all([
    api('GET','devices',null,q),
    api('GET','stock_purchases',null,q),
    api('GET','inventory',null,q),
    api('GET','customers',null,q),
    api('GET','suppliers',null,q),
    api('GET','bills',null,q),
    api('GET','expenses',null,q),
    api('GET','repairs',null,q),
    api('GET','settings',null,`user_id=eq.${CU.id}`)
  ]);
  D.devices=a||[];D.stockPurchases=b||[];D.inventory=c||[];
  D.customers=d||[];D.suppliers=e||[];D.bills=f||[];
  D.expenses=g||[];D.repairs=h||[];
  D.settings=sett&&sett[0]?sett[0]:{company_name:'iVault',address:'',phone:'',email:'',bank1_name:'HBL',bank1_acc:'',bank1_title:'',bank2_name:'Meezan Bank',bank2_acc:'',bank2_title:''};
}

const fmt=n=>'Rs. '+Number(n||0).toLocaleString();
const today=()=>new Date().toISOString().split('T')[0];
const dl=(content,type,filename)=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=filename;a.click();};

function renderNav(){
  document.getElementById('nav').innerHTML=NAV.map(n=>`<button class="nb${ST.tab===n.id?' active':''}" onclick="setTab('${n.id}')">${n.icon} ${n.label}</button>`).join('');
}
function setTab(t){
  ST.tab=t;ST.search='';renderNav();renderMain();
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
function renderMain(){
  const pages={dashboard:rDash,devices:rDevices,stock:rStock,inventory:rInventory,people:rPeople,billing:rBilling,expenses:rExpenses,repairs:rRepairs,reports:rReports,backup:rBackup,settings:rSettings};
  document.getElementById('main').innerHTML=(pages[ST.tab]||rDash)();
}

// DASHBOARD
function rDash(){
  const availInv=D.inventory.filter(i=>i.status==='Available');
  const soldInv=D.inventory.filter(i=>i.status==='Sold');
  const rev=D.bills.reduce((a,b)=>a+Number(b.total),0);
  const prof=D.bills.reduce((a,b)=>a+Number(b.profit),0);
  const exp=D.expenses.reduce((a,e)=>a+Number(e.amount),0);
  const net=prof-exp;

let stockUnits=[];
function openStockModal2(){stockUnits=[];openStockModal();setTimeout(()=>{addStockUnit();},50);}

function addStockUnit(){
  stockUnits.push({device_id:'',color:'',storage:'',condition:'New',serial:'',imei:'',cost:''});
  refreshStockUnits();
}

function refreshStockUnits(){
  const wrap=document.getElementById('stockUnitsWrap');if(!wrap)return;
  const deviceOpts=D.devices.map(d=>`<option value="${d.id}" data-cost="${d.base_cost}">${d.name}</option>`).join('');
  wrap.innerHTML=stockUnits.map((u,i)=>`
    <div class="unit-row">
      <div class="unit-title">Unit ${i+1} <button onclick="stockUnits.splice(${i},1);refreshStockUnits()" style="font-size:10px;color:var(--red);background:none;border:none;cursor:pointer;float:right">✕ Remove</button></div>
      <div class="tf">
        <div class="mfield"><label>Device</label><select onchange="stockUnits[${i}].device_id=this.value;stockUnits[${i}].cost=this.options[this.selectedIndex].dataset.cost||'';refreshStockUnits()"><option value="">Select device...</option>${deviceOpts}</select></div>

async function saveStockPurchase(){
  const date=document.getElementById('sp_date')?.value;
  const pid=document.getElementById('sp_pid')?.value;
  const supplierName=document.getElementById('sp_supplier_name')?.value;
  const supplierId=document.getElementById('sp_supplier_id')?.value;
  const notes=document.getElementById('sp_notes')?.value;
  if(!supplierName) return alert('Supplier required');
  if(stockUnits.length===0) return alert('Add at least 1 unit');
  const validUnits=stockUnits.filter(u=>u.device_id);
  if(validUnits.length===0) return alert('Select device for each unit');
  const totalCost=validUnits.reduce((a,u)=>a+Number(u.cost||0),0);
  // Save purchase
  const purchase=await api('POST','stock_purchases',{user_id:CU.id,purchase_id:pid,date,supplier_name:supplierName,supplier_id:supplierId||null,total_cost:totalCost,notes});
  if(!purchase||!purchase[0]) return alert('Failed to save purchase');
  const purchaseId=purchase[0].id;
  // Save each unit to inventory
  for(const u of validUnits){
    const dev=D.devices.find(d=>d.id==u.device_id);
    await api('POST','inventory',{user_id:CU.id,purchase_id:purchaseId,device_id:u.device_id,device_name:dev?.name||'',brand:dev?.brand||'',category:dev?.category||'',color:u.color,storage:u.storage,condition:u.condition,serial:u.serial,imei:u.imei,cost_price:Number(u.cost)||0,status:'Available',date});
  }
  closeModal();await loadAll();renderMain();
}

function searchInventory(idx,query){
  const suggestEl=document.getElementById(`bi_suggest_${idx}`);
  if(!query||query.length<2){if(suggestEl)suggestEl.style.display='none';return;}
  const results=D.inventory.filter(i=>i.status==='Available'&&(
    (i.imei||'').toLowerCase().includes(query.toLowerCase())||
    (i.serial||'').toLowerCase().includes(query.toLowerCase())||
    (i.device_name||'').toLowerCase().includes(query.toLowerCase())
  )).slice(0,8);
  if(!suggestEl)return;
  if(results.length===0){suggestEl.style.display='none';return;}
  suggestEl.style.display='block';
  suggestEl.innerHTML=results.map(r=>`<div class="suggest-item" onclick="selectInventoryItem(${idx},${r.id})">
    <b>${r.device_name}</b> · ${r.color||''} ${r.storage||''}<br>
    <span style="font-size:10px;color:var(--text3)">${r.serial?'SN:'+r.serial:''} ${r.imei?'IMEI:'+r.imei:''} · Cost: ${fmt(r.cost_price)}</span>
  </div>`).join('');
}

function selectInventoryItem(idx,invId){
  const inv=D.inventory.find(i=>i.id===invId);if(!inv)return;
  billItems[idx]={...billItems[idx],inv_id:invId,device_name:inv.device_name,serial:inv.serial,imei:inv.imei,cost_price:inv.cost_price,search:`${inv.device_name} ${inv.serial||''} ${inv.imei||''}`};
  const suggestEl=document.getElementById(`bi_suggest_${idx}`);
  if(suggestEl)suggestEl.style.display='none';
  refreshBillItems();
  // restore sale price
  setTimeout(()=>{const el=document.getElementById(`bi_price_${idx}`);if(el)el.value=billItems[idx].sale_price||'';},20);
}

async function saveBill(){
  const custName=document.getElementById('bill_cust_name')?.value.trim();
  const custPhone=document.getElementById('bill_cust_phone')?.value.trim();
  const notes=document.getElementById('bill_notes')?.value.trim();
  if(!custName) return alert('Customer name required');
  // refresh prices from inputs
  billItems.forEach((item,i)=>{const el=document.getElementById(`bi_price_${i}`);if(el)item.sale_price=el.value;});
  const validItems=billItems.filter(item=>item.sale_price);
  if(validItems.length===0) return alert('Add at least 1 item with a sale price');
  const total=validItems.reduce((a,i)=>a+Number(i.sale_price),0);
  const cost=validItems.reduce((a,i)=>a+Number(i.cost_price||0),0);
  const num=String(D.bills.length+1).padStart(3,'0');
  const billId=`INV-${num}`;
  const res=await api('POST','bills',{id:billId,user_id:CU.id,customer_name:custName,customer_phone:custPhone,date:today(),items:validItems,total,profit:total-cost,notes});
  if(!res||!res[0]) return alert('Failed to create invoice');
  // Mark inventory units as sold
  for(const item of validItems){
    if(item.inv_id) await api('PATCH','inventory',{status:'Sold',sold_invoice:billId},`id=eq.${item.inv_id}`);
  }
  closeModal();await loadAll();renderMain();
}

// SUGGEST HELPER
function filterSuggest(inputId,hiddenId,list,labelField,valueField){
  const query=document.getElementById(inputId)?.value.toLowerCase()||'';
  const suggestId=inputId+'_suggest';
  const el=document.getElementById(suggestId);if(!el)return;
  if(!query){el.style.display='none';return;}
  const results=list.filter(x=>(x[labelField]||'').toLowerCase().includes(query)).slice(0,6);
  if(results.length===0){el.style.display='none';return;}
  el.style.display='block';
  el.innerHTML=results.map(x=>`<div class="suggest-item" onclick="selectSuggest('${inputId}','${hiddenId}','${x[labelField].replace(/'/g,"\\'")}','${x[valueField]}')">${x[labelField]}</div>`).join('');
}
function selectSuggest(inputId,hiddenId,label,value){
  const inp=document.getElementById(inputId);const hid=document.getElementById(hiddenId);
  if(inp)inp.value=label;if(hid)hid.value=value;
  const el=document.getElementById(inputId+'_suggest');if(el)el.style.display='none';
  // auto-fill phone for customer
  if(inputId==='bill_cust_name'){const c=D.customers.find(x=>x.id==value);if(c&&c.phone){const ph=document.getElementById('bill_cust_phone');if(ph&&!ph.value)ph.value=c.phone;}}
}

    <div class="mfield"><label>Status</label><select id="f_status">${['Pending','In Progress','Ready','Delivered'].map(s=>`<option${(f.status||'Pending')===s?' selected':''}>${s}</option>`).join('')}</select></div>
    <div class="mfield"><label>Charge (Rs.)</label><input type="number" id="f_charge" value="${f.charge||''}"></div>
    <div class="mfield"><label>Notes</label><input id="f_notes" value="${f.notes||''}"></div>`;}
  return`<div class="modal-ov" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>${title}</h3>${body}<div class="mbtns"><button class="bsave" onclick="saveForm('${type}')">${isEdit?'Save Changes':'Add'}</button><button class="bcancel" onclick="closeModal()">Cancel</button></div></div></div>`;
}

async function saveForm(type){
  const g=id=>document.getElementById(id)?.value||'';
  const gn=id=>Number(document.getElementById(id)?.value||0);
  const uid=CU.id;let data={},table='',isEdit=ST.editId!==null;
  if(type==='device'){if(!g('f_name'))return alert('Device name required');data={user_id:uid,name:g('f_name'),brand:g('f_brand'),category:g('f_category'),base_cost:gn('f_base_cost'),notes:g('f_notes')};table='devices';}
  else if(type==='cust'){if(!g('f_name'))return alert('Name required');data={user_id:uid,name:g('f_name'),phone:g('f_phone'),email:g('f_email'),city:g('f_city'),type:g('f_type')};table='customers';}
  else if(type==='supp'){if(!g('f_name'))return alert('Name required');data={user_id:uid,name:g('f_name'),phone:g('f_phone'),email:g('f_email'),city:g('f_city')};table='suppliers';}
  else if(type==='expense'){if(!g('f_description'))return alert('Description required');data={user_id:uid,date:g('f_date'),category:g('f_category'),description:g('f_description'),amount:gn('f_amount')};table='expenses';}
  else if(type==='repair'){if(!g('f_customer')||!g('f_device'))return alert('Customer and device required');const jobId=isEdit?ST.form.job_id:`REP-${String(D.repairs.length+1).padStart(3,'0')}`;data={user_id:uid,job_id:jobId,date:g('f_date'),customer:g('f_customer'),phone:g('f_phone'),device:g('f_device'),issue:g('f_issue'),status:g('f_status'),charge:gn('f_charge'),notes:g('f_notes')};table='repairs';}
  const res=isEdit?await api('PATCH',table,data,`id=eq.${ST.editId}`):await api('POST',table,data);
  if(!res)return alert('Save failed. Try again.');
  closeModal();await loadAll();renderMain();
}

async function delRow(table,id){
  if(!confirm('Delete this item?'))return;
  await api('DELETE',table,null,`id=eq.${id}`);
  await loadAll();renderMain();
}

async function saveSettings(){
  const g=id=>document.getElementById(id)?.value||'';const uid=CU.id;
  const data={company_name:g('s_company_name'),address:g('s_address'),phone:g('s_phone'),email:g('s_email'),bank1_name:g('s_bank1_name'),bank1_acc:g('s_bank1_acc'),bank1_title:g('s_bank1_title'),bank2_name:g('s_bank2_name'),bank2_acc:g('s_bank2_acc'),bank2_title:g('s_bank2_title')};
  const exists=await api('GET','settings',null,`user_id=eq.${uid}`);
  const res=exists&&exists.length>0?await api('PATCH','settings',data,`user_id=eq.${uid}`):await api('POST','settings',{...data,user_id:uid});
  if(!res)return alert('Save failed');
  await loadAll();alert('Settings saved ✓');
}

// EXPORT
function exportExcel(){
  const rows=[['iVault Report — '+new Date().toLocaleDateString()],[],['SALES INVOICES'],['Invoice','Customer','Date','Total','Profit']];
  D.bills.forEach(b=>rows.push([b.id,b.customer_name,b.date,b.total,b.profit]));
  rows.push([],['INVENTORY'],['Device','Serial','IMEI','Color','Storage','Cost','Status']);
  D.inventory.forEach(i=>rows.push([i.device_name,i.serial||'',i.imei||'',i.color||'',i.storage||'',i.cost_price,i.status]));
  rows.push([],['EXPENSES'],['Date','Category','Description','Amount']);
  D.expenses.forEach(e=>rows.push([e.date,e.category,e.description,e.amount]));
  const rev=D.bills.reduce((a,b)=>a+Number(b.total),0);
  const prof=D.bills.reduce((a,b)=>a+Number(b.profit),0);
  const exp=D.expenses.reduce((a,e)=>a+Number(e.amount),0);
  rows.push([],['SUMMARY'],['Total Revenue',rev],['Gross Profit',prof],['Total Expenses',exp],['Net Profit',prof-exp]);
  const csv=rows.map(r=>r.map(c=>JSON.stringify(c??'')).join(',')).join('\n');
  dl('\ufeff'+csv,'text/csv',`iVault_Report_${today()}.csv`);
  alert('Exported! Open with Excel or Google Sheets.');
}

  <h2>Summary</h2><div class="summary">
    <div class="scard"><div class="l">Total Revenue</div><div class="v green">Rs. ${rev.toLocaleString()}</div></div>
    <div class="scard"><div class="l">Gross Profit</div><div class="v green">Rs. ${prof.toLocaleString()}</div></div>
    <div class="scard"><div class="l">Total Expenses</div><div class="v red">Rs. ${exp.toLocaleString()}</div></div>
    <div class="scard"><div class="l">Net Profit</div><div class="v ${net>=0?'green':'red'}">Rs. ${net.toLocaleString()}</div></div>
  </div>

  <h2>Inventory</h2><table><thead><tr><th>Device</th><th>Serial</th><th>IMEI</th><th>Cost</th><th>Status</th></tr></thead><tbody>${D.inventory.map(i=>`<tr><td>${i.device_name}</td><td>${i.serial||'—'}</td><td>${i.imei||'—'}</td><td>Rs. ${Number(i.cost_price).toLocaleString()}</td><td>${i.status}</td></tr>`).join('')}</tbody></table>
  <script>window.print();setTimeout(()=>window.close(),2000);<\/script></body></html>`);
  w.document.close();
}
