<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iVault — Device Shop Manager</title>
<style>
:root{
  --bg:#0b0d14;--bg2:#13161f;--bg3:#1a1d28;--bg4:#21253a;
  --border:#2a2e45;--border2:#353a55;
  --text:#ffffff;--text2:#b8bcd0;--text3:#6b7090;
  --orange:#f97316;--orange2:#ea6a0a;--orange-bg:rgba(249,115,22,0.12);
  --green:#22c55e;--green-bg:rgba(34,197,94,0.12);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.12);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,0.12);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.12);
  --purple:#8b5cf6;--purple-bg:rgba(139,92,246,0.12);
}
.light{
  --bg:#f1f4fb;--bg2:#ffffff;--bg3:#e8ecf7;--bg4:#dde3f5;
  --border:#d0d6ee;--border2:#b8c0e0;
  --text:#0f1117;--text2:#4a5070;--text3:#8890b0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}
.screen{display:none;min-height:100vh}.screen.active{display:flex}

/* AUTH */
#authScreen{align-items:center;justify-content:center;background:var(--bg);padding:16px}
.auth-wrap{width:100%;max-width:400px}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo .logo-icon{width:56px;height:56px;background:var(--orange);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:12px}
.auth-logo h1{font-size:28px;font-weight:800;color:var(--text)}
.auth-logo p{font-size:13px;color:var(--text3);margin-top:4px}
.auth-box{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:32px}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;background:var(--bg3);border-radius:10px;padding:4px}
.auth-tab{flex:1;padding:9px;border:none;background:none;color:var(--text3);font-size:13px;cursor:pointer;border-radius:8px;font-weight:600;transition:all .15s}
.auth-tab.active{background:var(--bg2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.field{margin-bottom:16px}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;font-weight:600;letter-spacing:.3px}
.field input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:var(--bg3);color:var(--text);outline:none;transition:border .15s}
.field input:focus{border-color:var(--orange)}
.btn-auth{width:100%;padding:13px;background:var(--orange);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;transition:background .15s}
.btn-auth:hover{background:var(--orange2)}
.forgot-link{display:block;text-align:center;margin-top:12px;font-size:12px;color:var(--text3);cursor:pointer;font-weight:500}
.forgot-link span{color:var(--orange);font-weight:600}
.auth-msg{font-size:12px;text-align:center;margin-top:10px;min-height:16px;font-weight:600}
.auth-msg.err{color:var(--red)}.auth-msg.ok{color:var(--green)}

/* APP */
#appScreen{flex-direction:row}
.sidebar{width:210px;min-width:210px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;transition:transform .25s;z-index:150}
.logo-area{padding:20px 16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon-sm{width:38px;height:38px;background:var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text h2{font-size:15px;font-weight:800;color:var(--text)}
.logo-text span{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.nav{flex:1;padding:10px 8px;overflow-y:auto}
.nb{width:100%;padding:10px 12px;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text3);text-align:left;border-radius:10px;transition:all .15s;font-weight:500;margin-bottom:2px}
.nb:hover{color:var(--text);background:var(--bg3)}
.nb.active{color:var(--orange);background:var(--orange-bg);font-weight:700}
.nb .nav-icon{font-size:16px;width:20px;text-align:center}
.user-area{padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.user-avatar{width:36px;height:36px;border-radius:10px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.user-details{flex:1;min-width:0}
.user-details .uname{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-details .uemail{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-logout{display:flex;align-items:center;justify-content:center;gap:7px;margin:0 12px 14px;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:700;transition:all .15s}
.btn-logout:hover{background:var(--red-bg);border-color:rgba(239,68,68,0.3);color:var(--red)}
.hamburger{display:none;position:fixed;top:13px;left:13px;z-index:200;background:var(--orange);border:none;border-radius:9px;padding:9px 11px;color:#fff;font-size:17px;cursor:pointer}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99}
.main{flex:1;overflow-y:auto;min-width:0;background:var(--bg)}

/* TOPBAR */
.page-header{padding:22px 24px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.page-header h1{font-size:22px;font-weight:800;color:var(--text)}
.page-content{padding:0 24px 24px}

/* BUTTONS */
.btn-orange{padding:9px 16px;background:var(--orange);color:#fff;border:none;border-radius:9px;font-size:13px;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:6px;transition:background .15s}
.btn-orange:hover{background:var(--orange2)}
.btn-outline{padding:9px 16px;background:none;color:var(--text2);border:1.5px solid var(--border2);border-radius:9px;font-size:13px;cursor:pointer;font-weight:600;transition:all .15s}
.btn-outline:hover{border-color:var(--orange);color:var(--orange)}
.btn-green{padding:9px 16px;background:var(--green-bg);color:var(--green);border:1.5px solid rgba(34,197,94,0.3);border-radius:9px;font-size:13px;cursor:pointer;font-weight:700}
.btn-red{padding:9px 16px;background:var(--red-bg);color:var(--red);border:1.5px solid rgba(239,68,68,0.3);border-radius:9px;font-size:13px;cursor:pointer;font-weight:700}
.btn-blue{padding:9px 16px;background:var(--blue-bg);color:var(--blue);border:1.5px solid rgba(59,130,246,0.3);border-radius:9px;font-size:13px;cursor:pointer;font-weight:700}
.btn-wa{padding:9px 16px;background:rgba(37,211,102,0.12);color:#25d366;border:1.5px solid rgba(37,211,102,0.3);border-radius:9px;font-size:13px;cursor:pointer;font-weight:700}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:7px}
.iab{font-size:11px;padding:4px 9px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text3);font-weight:500}
.iab:hover{background:var(--bg3);color:var(--text)}

/* METRICS */
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px}
.metric-card .mc-label{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.metric-card .mc-val{font-size:26px;font-weight:800;line-height:1}
.mc-val.orange{color:var(--orange)}.mc-val.green{color:var(--green)}.mc-val.red{color:var(--red)}.mc-val.blue{color:var(--blue)}.mc-val.amber{color:var(--amber)}.mc-val.white{color:var(--text)}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* TABLE */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:10px 14px;color:var(--text3);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:500;color:var(--text)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg3)}

/* PERSON ROW */
.person-avatar{width:36px;height:36px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}

/* ITEM ROW */
.item-row{display:flex;justify-content:space-between;align-items:flex-start;background:var(--bg3);border-radius:12px;padding:14px 16px;margin-bottom:8px;gap:10px;border:1px solid var(--border)}
.item-row .mi{flex:1;min-width:0}
.item-row .iname{font-size:14px;font-weight:700;color:var(--text)}
.item-row .isub{font-size:12px;color:var(--text2);margin-top:3px;font-weight:500}
.item-row .iacts{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}

/* BADGES */
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;white-space:nowrap;display:inline-block}
.badge-orange{background:var(--orange-bg);color:var(--orange)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-purple{background:var(--purple-bg);color:var(--purple)}
.badge-gray{background:var(--bg4);color:var(--text3)}

/* TABS */
.tab-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab-btn{padding:8px 18px;border:1.5px solid var(--border2);border-radius:9px;font-size:13px;cursor:pointer;background:none;color:var(--text3);font-weight:600;transition:all .15s}
.tab-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:var(--bg2);color:var(--text);outline:none;font-weight:500}
.search-wrap input:focus{border-color:var(--orange)}
.search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}
.plain-search{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:var(--bg2);color:var(--text);outline:none;font-weight:500;margin-bottom:14px}
.plain-search:focus{border-color:var(--orange)}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:300;padding:14px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:24px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:800;margin-bottom:18px;color:var(--text)}
.mfield{margin-bottom:12px}
.mfield label{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;font-weight:700;letter-spacing:.3px}
.mfield input,.mfield select,.mfield textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;background:var(--bg3);color:var(--text);outline:none;font-weight:500;transition:border .15s}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{border-color:var(--orange)}
.mfield textarea{resize:vertical;min-height:65px}
.tf{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mbtns{display:flex;gap:8px;margin-top:16px}
.bsave{flex:1;padding:11px;background:var(--orange);color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700}
.bsave:hover{background:var(--orange2)}
.bcancel{flex:1;padding:11px;border:1.5px solid var(--border2);border-radius:10px;background:none;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600}

/* SUGGEST */
.suggest-wrap{position:relative}
.suggest-list{background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;max-height:180px;overflow-y:auto;position:absolute;z-index:100;width:100%;top:calc(100% + 4px);left:0;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.suggest-item{padding:10px 14px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text);border-bottom:1px solid var(--border)}
.suggest-item:hover{background:var(--bg3)}
.suggest-item:last-child{border-bottom:none}

/* UNIT ROW */
.unit-row{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.unit-title{font-size:12px;font-weight:700;color:var(--orange);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}

/* MISC */
.empty{text-align:center;padding:36px;color:var(--text3);font-size:13px;font-weight:500}
.ri{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;font-weight:500;color:var(--text)}
.ri:last-child{border-bottom:none}
.info-badge{background:var(--green-bg);border:1px solid rgba(34,197,94,0.2);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--green);font-weight:600;margin-bottom:8px}
.theme-toggle{display:flex;gap:10px;margin-bottom:16px}
.theme-btn{flex:1;padding:16px;border:2px solid var(--border);border-radius:12px;background:none;cursor:pointer;font-size:13px;font-weight:700;color:var(--text2);transition:all .15s;text-align:center}
.theme-btn.active{border-color:var(--orange);color:var(--orange);background:var(--orange-bg)}
.divider{height:1px;background:var(--border);margin:16px 0}

@media(max-width:700px){
  .hamburger{display:block}
  .sidebar{position:fixed;left:0;top:0;height:100vh;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .overlay.open{display:block}
  .main .page-header,.main .page-content{padding-left:16px;padding-right:16px}
  .page-header{padding-top:58px}
  .metric-grid{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}
  .tf{grid-template-columns:1fr}
}
</style>
</head>
<body>
<button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- AUTH -->
<div id="authScreen" class="screen active">
  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="logo-icon">🔐</div>
      <h1>iVault</h1>
      <p>Smart Device Shop Manager</p>
    </div>
    <div class="auth-box">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab_login" onclick="switchAuth('login')">Login</button>
        <button class="auth-tab" id="tab_signup" onclick="switchAuth('signup')">Sign Up</button>
      </div>
      <!-- LOGIN -->
      <div id="loginForm">
        <div class="field"><label>EMAIL ADDRESS</label><input id="loginEmail" type="email" placeholder="your@email.com"></div>
        <div class="field"><label>PASSWORD</label><input id="loginPass" type="password" placeholder="••••••••"></div>
        <button class="btn-auth" onclick="doLogin()">Login to iVault</button>
        <div class="forgot-link" onclick="switchAuth('reset')">Forgot password? <span>Reset here</span></div>
      </div>
      <!-- SIGNUP -->
      <div id="signupForm" style="display:none">
        <div class="field"><label>FULL NAME</label><input id="signupName" placeholder="Ahmed Raza"></div>
        <div class="field"><label>SHOP NAME</label><input id="signupShop" placeholder="My Device Shop"></div>
        <div class="field"><label>EMAIL ADDRESS</label><input id="signupEmail" type="email" placeholder="your@email.com"></div>
        <div class="field"><label>PASSWORD (MIN 6 CHARS)</label><input id="signupPass" type="password" placeholder="••••••••"></div>
        <button class="btn-auth" onclick="doSignup()">Create Account</button>
      </div>
      <!-- RESET -->
      <div id="resetForm" style="display:none">
        <p style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6;font-weight:500">Enter your email and we will send a password reset link.</p>
        <div class="field"><label>EMAIL ADDRESS</label><input id="resetEmail" type="email" placeholder="your@email.com"></div>
        <button class="btn-auth" onclick="doReset()">Send Reset Email</button>
        <div class="forgot-link" onclick="switchAuth('login')">← <span>Back to login</span></div>
      </div>
      <div class="auth-msg" id="authMsg"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="screen">
  <div class="sidebar" id="sidebar">
    <div class="logo-area">
      <div class="logo-icon-sm">🔐</div>
      <div class="logo-text"><h2>iVault</h2><span>Device Shop Manager</span></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="user-area">
      <div class="user-avatar" id="userAvatar">A</div>
      <div class="user-details">
        <div class="uname" id="sidebarName">—</div>
        <div class="uemail" id="sidebarEmail">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="doLogout()">
      <span style="font-size:15px">⏻</span> Logout
    </button>
  </div>
  <div class="main" id="main"><div style="text-align:center;padding:60px;color:var(--text3);font-size:14px;font-weight:600">Loading iVault...</div></div>
</div>

<script>
const SUPA='https://yfjrrfbfxprrrdeynzez.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmanJyZmJmeHBycnJkZXluemV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjU3NzUsImV4cCI6MjA5NDEwMTc3NX0.Dn4dgxZC2V3p6a-Ng4a8mk8h9J5cj17wUWagE1XFAUI';
const NAV=[
  {id:'dashboard',icon:'⊞',label:'Dashboard'},
  {id:'devices',icon:'📱',label:'Device Catalog'},
  {id:'stock',icon:'🚚',label:'Stock Purchases'},
  {id:'inventory',icon:'🗃️',label:'Inventory'},
  {id:'people',icon:'👥',label:'People'},
  {id:'billing',icon:'🧾',label:'Billing'},
  {id:'expenses',icon:'💸',label:'Expenses'},
  {id:'repairs',icon:'🔧',label:'Repairs'},
  {id:'ledger',icon:'📒',label:'Ledger'},
  {id:'reports',icon:'📊',label:'Reports'},
  {id:'backup',icon:'☁️',label:'Backup'},
  {id:'settings',icon:'⚙️',label:'Settings'},
];
const AVATAR_COLORS=['#f97316','#8b5cf6','#3b82f6','#22c55e','#ef4444','#f59e0b'];
function avatarColor(name){let h=0;for(let c of(name||''))h=c.charCodeAt(0)+((h<<5)-h);return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length];}
function initials(name){return(name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}

let CU=null,CS=null,THEME='dark';
let ST={tab:'dashboard',peopleTab:'customers',ledgerTab:'customers',search:'',editId:null,form:{},billDetail:null,settingsTab:'company'};
let D={devices:[],stockPurchases:[],inventory:[],customers:[],suppliers:[],bills:[],expenses:[],repairs:[],customerPayments:[],supplierPayments:[],settings:null};
let stockUnits=[],billItems=[];

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function applyTheme(t){THEME=t;document.body.classList.toggle('light',t==='light');localStorage.setItem('ivault_theme',t);}

// API
async function api(method,table,body=null,match=null){
  let url=`${SUPA}/rest/v1/${table}`;
  const token=CS?.access_token||KEY;
  const h={'Content-Type':'application/json','apikey':KEY,'Authorization':`Bearer ${token}`,'Prefer':'return=representation'};
  const q=[];if(method==='GET')q.push('select=*');if(match)q.push(match);if(q.length)url+='?'+q.join('&');
  const r=await fetch(url,{method,headers:h,body:body?JSON.stringify(body):null});
  if(!r.ok){
    const errText=await r.text();
    console.error('API error',method,table,r.status,errText);
    // If 401/403 session expired — try to refresh
    if(r.status===401||r.status===403){
      try{
        const ref=await fetch(`${SUPA}/auth/v1/token?grant_type=refresh_token`,{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY},body:JSON.stringify({refresh_token:CS?.refresh_token})});
        const newSession=await ref.json();
        if(newSession?.access_token){
          CS=newSession;
          // Retry once with new token
          const h2={...h,'Authorization':`Bearer ${newSession.access_token}`};
          const r2=await fetch(url,{method,headers:h2,body:body?JSON.stringify(body):null});
          if(!r2.ok){console.error('Retry failed',await r2.text());return null;}
          const t2=await r2.text();return t2?JSON.parse(t2):[];
        }
      }catch(e){console.error('Token refresh failed',e);}
    }
    return null;
  }
  const t=await r.text();return t?JSON.parse(t):[];
}
async function authCall(action,email,pass,meta={}){
  const r=await fetch(`${SUPA}/auth/v1/${action}`,{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY},body:JSON.stringify({email,password:pass,...(action==='signup'?{data:meta}:{})})});
  return r.json();
}

async function doLogin(){

  setMsg('Logging in...','');

async function doSignup(){

  setMsg('Creating account...','');
  const res=await authCall('signup',email,pass,{full_name:name,shop_name:shop});
  if(res.error)return setMsg(res.error.message||'Signup failed','err');
  if(res.session){

async function doReset(){

  const r=await fetch(`${SUPA}/auth/v1/recover`,{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY},body:JSON.stringify({email})});

  if(res.error)return setMsg(res.error.message,'err');
  setMsg('Reset email sent! Check your inbox.','ok');

// Returns array of bank objects {name,title,acc,iban}. Reads new 'banks' JSON; falls back to legacy bank1/bank2 fields.
function getBanks(s){
  s=s||D.settings||{};
  if(s.banks){
    try{const arr=typeof s.banks==='string'?JSON.parse(s.banks):s.banks;if(Array.isArray(arr)&&arr.length)return arr;}catch(e){}
  }
  const legacy=[];
  if(s.bank1_name||s.bank1_acc)legacy.push({name:s.bank1_name||'',title:s.bank1_title||'',acc:s.bank1_acc||'',iban:''});
  if(s.bank2_name||s.bank2_acc)legacy.push({name:s.bank2_name||'',title:s.bank2_title||'',acc:s.bank2_acc||'',iban:''});
  return legacy;
}

function renderInventoryList(filtered){
  if(!filtered)filtered=D.inventory.filter(i=>(i.serial||'').toLowerCase().includes(ST.search.toLowerCase())||(i.imei||'').toLowerCase().includes(ST.search.toLowerCase())||(i.device_name||'').toLowerCase().includes(ST.search.toLowerCase()));
  const sort=ST.invSort||'default';
  if(sort==='available')filtered=[...filtered].sort((a,b)=>(a.status==='Available'?0:1)-(b.status==='Available'?0:1));
  else if(sort==='sold')filtered=[...filtered].sort((a,b)=>(a.status==='Sold'?0:1)-(b.status==='Sold'?0:1));
  if(filtered.length===0)return'<div class="empty">No inventory found</div>';
  return filtered.map(i=>`
    <div class="item-row"><div class="mi"><div class="iname">${i.device_name||'Unknown'}</div>
      <div class="isub">${[i.color,i.storage,i.condition].filter(Boolean).join(' · ')}</div>

      ${i.imei?`<div class="isub">IMEI: <b>${i.imei}</b></div>`:''}
      <div class="isub">Cost: ${fmt(i.cost_price)} · ${i.date||''}</div>
    </div><div style="text-align:right"><span class="badge ${i.status==='Available'?'badge-green':'badge-purple'}">${i.status}</span>${i.status==='Sold'?`<div style="font-size:10px;color:var(--text3);margin-top:5px">${i.sold_invoice||''}</div>`:''}</div></div>`).join('');
}

// Refilter without full re-render — preserves focus
function refilter(section){
  if(section==='devices'){const el=document.getElementById('devList');if(el)el.innerHTML=renderDeviceList();}
  else if(section==='inventory'){const el=document.getElementById('invList');if(el)el.innerHTML=renderInventoryList();}
  else if(section==='people'){const el=document.getElementById('peopleList');if(el)el.innerHTML=renderPeopleList();}
  else if(section==='billing'){const el=document.getElementById('billList');if(el)el.innerHTML=renderBillList();}
  else if(section==='stock'){const el=document.getElementById('stockList');if(el)el.innerHTML=renderStockList();}
  else if(section==='ledger'){const el=document.getElementById('ledgerList');if(el)el.innerHTML=renderLedgerList();}
}

}

// Ledger name store — avoids HTML encoding issues with special chars in names
const _ldNames={};

// Ledger balance helpers — match by customer_id FIRST, then name (fixes edited-bill mismatch)
function ledgerBillsFor(c){return D.bills.filter(b=>(b.customer_id&&String(b.customer_id)===String(c.id))||b.customer_name===c.name);}
function ledgerPurchasesFor(s){return D.stockPurchases.filter(p=>(p.supplier_id&&String(p.supplier_id)===String(s.id))||p.supplier_name===s.name);}
function custBalanceOf(c){
  const totalBilled=ledgerBillsFor(c).reduce((a,b)=>a+Number(b.total),0);
  const totalPaid=D.customerPayments.filter(p=>p.customer_id==c.id&&Number(p.amount)>0).reduce((a,p)=>a+Number(p.amount),0);
  const openingDebit=D.customerPayments.filter(p=>p.customer_id==c.id&&p.payment_method==='Opening Balance').reduce((a,p)=>a+Math.abs(Number(p.amount)),0);
  return{totalBilled,totalPaid,balance:(totalBilled+openingDebit)-totalPaid};
}
function suppBalanceOf(s){
  const totalOwed=ledgerPurchasesFor(s).reduce((a,p)=>a+Number(p.total_cost),0);
  const totalPaid=D.supplierPayments.filter(p=>p.supplier_id==s.id&&Number(p.amount)>0).reduce((a,p)=>a+Number(p.amount),0);
  const openingDebit=D.supplierPayments.filter(p=>p.supplier_id==s.id&&p.payment_method==='Opening Balance').reduce((a,p)=>a+Math.abs(Number(p.amount)),0);
  return{totalOwed,totalPaid,balance:(totalOwed+openingDebit)-totalPaid};
}

function buildLedgerTimeline(type,id,name){
  const isC=type===1;
  const bills=isC?D.bills.filter(b=>(b.customer_id&&String(b.customer_id)===String(id))||b.customer_name===name):[];
  const purchases=!isC?D.stockPurchases.filter(p=>(p.supplier_id&&String(p.supplier_id)===String(id))||p.supplier_name===name):[];
  const payments=isC?D.customerPayments.filter(p=>p.customer_id==id):D.supplierPayments.filter(p=>p.supplier_id==id);
  const timeline=[];
  if(isC) bills.forEach(b=>timeline.push({date:b.date,type:'invoice',label:`Invoice ${b.id}`,debit:Number(b.total),credit:0}));
  else purchases.forEach(p=>timeline.push({date:p.date,type:'purchase',label:`Purchase ${p.purchase_id||p.id}`,debit:Number(p.total_cost),credit:0}));
  payments.forEach(p=>{
    const amt=Number(p.amount);
    const isOpening=p.payment_method==='Opening Balance';
    if(isOpening){
      // negative amount = opening debit (they owe us / we owe them)
      timeline.push({date:p.date,type:'opening',label:`📌 ${p.note||'Opening balance'}`,debit:Math.abs(amt),credit:0,payId:p.id});
    } else {
      timeline.push({date:p.date,type:'payment',label:`Payment (${p.payment_method})${p.note?' — '+p.note:''}`,debit:0,credit:amt,payId:p.id});
    }
  });
  timeline.sort((a,b)=>new Date(a.date)-new Date(b.date));
  let running=0;
  return timeline.map(t=>{running+=t.debit-t.credit;return{...t,running};});
}

async function saveTerms(){
  const v=document.getElementById('s_terms')?.value||'';
  const uid=CU.id;
  const exists=await api('GET','settings',null,`user_id=eq.${uid}`);
  const res=exists&&exists.length>0
    ?await api('PATCH','settings',{terms:v},`user_id=eq.${uid}`)
    :await api('POST','settings',{user_id:uid,terms:v});
  if(!res){
    const el=document.getElementById('termsSavedMsg');
    if(el){el.textContent='❌ Save failed. Please try again.';el.style.color='var(--red)';}
    return;
  }
  // update local D.settings immediately so preview shows without reload
  if(D.settings) D.settings.terms=v;
  const el=document.getElementById('termsSavedMsg');
  if(el) el.textContent='✓ Terms saved to your account! Appears on all invoices.';
  setTimeout(()=>renderMain(),1400);
}

async function saveStockPurchase(){
  const date=document.getElementById('sp_date')?.value;
  const pid=document.getElementById('sp_pid')?.value;
  const supplierName=document.getElementById('sp_supplier_name')?.value?.trim();
  const supplierId=document.getElementById('sp_supplier_id')?.value;
  const notes=document.getElementById('sp_notes')?.value||'';
  const payStatus=document.getElementById('sp_pay_status')?.value||'Unpaid';
  const payMethod=document.getElementById('sp_pay_method')?.value||'Cash';
  if(!supplierName)return alert('Please enter a supplier name');
  if(stockUnits.length===0)return alert('Add at least 1 unit');
  const validUnits=stockUnits.filter(u=>u.device_id);
  if(validUnits.length===0)return alert('Please select a device for each unit');
  const totalCost=validUnits.reduce((a,u)=>a+Number(u.cost||0),0);
  const amountPaid=payStatus==='Cleared'?totalCost:payStatus==='Partial'?Number(document.getElementById('sp_amount_paid')?.value||0):0;
  const balance=totalCost-amountPaid;
  // Save purchase with payment info
  const purchase=await api('POST','stock_purchases',{
    user_id:CU.id,purchase_id:pid,date,
    supplier_name:supplierName,
    supplier_id:supplierId?Number(supplierId):null,
    total_cost:totalCost,notes,
    pay_status:payStatus,amount_paid:amountPaid,balance
  });
  if(!purchase||!purchase[0])return alert('Failed to save purchase. Please try again.');
  const purchaseId=purchase[0].id;
  // Save inventory units
  for(const u of validUnits){
    const dev=D.devices.find(d=>d.id==u.device_id);
    await api('POST','inventory',{user_id:CU.id,purchase_id:purchaseId,device_id:u.device_id,device_name:dev?.name||'',brand:dev?.brand||'',category:dev?.category||'',color:u.color||'',storage:u.storage||'',condition:u.condition||'New',serial:u.serial||'',imei:u.imei||'',cost_price:Number(u.cost)||0,status:'Available',date});
  }
  // Auto-add to supplier ledger if any payment made
  if(amountPaid>0&&supplierId){
    await api('POST','supplier_payments',{
      user_id:CU.id,
      supplier_id:Number(supplierId),
      supplier_name:supplierName,
      amount:amountPaid,
      payment_method:payMethod,
      note:`Payment on ${pid} (${payStatus})`,
      date
    });
  }
  closeModal();await loadAll();renderMain();
}

function searchInventory(idx,query){
  const suggestEl=document.getElementById(`bi_suggest_${idx}`);
  if(!query||query.length<1){if(suggestEl)suggestEl.style.display='none';return;}
  const results=D.inventory.filter(i=>i.status==='Available'&&(
    (i.imei||'').toLowerCase().includes(query.toLowerCase())||
    (i.serial||'').toLowerCase().includes(query.toLowerCase())||
    (i.device_name||'').toLowerCase().includes(query.toLowerCase())
  )).slice(0,8);
  if(!suggestEl)return;
  if(results.length===0){suggestEl.innerHTML='<div class="suggest-item" style="color:var(--text3)">No available units found</div>';suggestEl.style.display='block';return;}
  suggestEl.style.display='block';
  suggestEl.innerHTML=results.map(r=>`<div class="suggest-item" onclick="selectInventoryItem(${idx},${r.id})">
    <b>${r.device_name}</b>${r.color?' · '+r.color:''}${r.storage?' · '+r.storage:''}<br>
    <span style="font-size:11px;color:var(--text3)">${r.serial?'SN: '+r.serial+' ':''}${r.imei?'IMEI: '+r.imei:''} · Cost: ${fmt(r.cost_price)}</span>
  </div>`).join('');
}
function selectInventoryItem(idx,invId){
  const inv=D.inventory.find(i=>i.id===invId);if(!inv)return;
  billItems[idx]={...billItems[idx],inv_id:invId,device_name:inv.device_name,color:inv.color||'',storage:inv.storage||'',condition:inv.condition||'',serial:inv.serial||'',imei:inv.imei||'',cost_price:inv.cost_price,search:`${inv.device_name} ${inv.serial||''} ${inv.imei||''}`};
  const el=document.getElementById(`bi_suggest_${idx}`);if(el)el.style.display='none';
  refreshBillItems();
  setTimeout(()=>{const p=document.getElementById(`bi_price_${idx}`);if(p)p.value=billItems[idx].sale_price||'';},30);
}

async function saveBill(){
  const custName=document.getElementById('bill_cust_name')?.value?.trim();
  const custPhone=document.getElementById('bill_cust_phone')?.value?.trim()||'';
  const notes=document.getElementById('bill_notes')?.value?.trim()||'';
  const payStatus=document.getElementById('bill_pay_status')?.value||'Unpaid';
  if(!custName)return alert('Customer name is required');
  billItems.forEach((item,i)=>{const el=document.getElementById(`bi_price_${i}`);if(el)item.sale_price=el.value;});
  const validItems=billItems.filter(item=>Number(item.sale_price)>0);
  if(validItems.length===0)return alert('Add at least 1 item with a sale price');
  const total=validItems.reduce((a,i)=>a+Number(i.sale_price),0);
  const cost=validItems.reduce((a,i)=>a+Number(i.cost_price||0),0);
  const amountPaid=payStatus==='Cleared'?total:payStatus==='Partial'?Number(document.getElementById('bill_amount_paid')?.value||0):0;
  const balance=total-amountPaid;
  const d=new Date();
  const datePart=`${String(d.getFullYear()).slice(2)}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  const timePart=String(d.getHours()).padStart(2,'0')+String(d.getMinutes()).padStart(2,'0')+String(d.getSeconds()).padStart(2,'0');
  const billId=`INV-${datePart}-${timePart}`;
  const custId=document.getElementById('bill_cust_id')?.value||null;
  // Try with new columns first, fallback to basic columns if it fails
  let res=await api('POST','bills',{id:billId,user_id:CU.id,customer_name:custName,customer_id:custId?Number(custId):null,customer_phone:custPhone,date:today(),items:validItems,total,profit:total-cost,notes,pay_status:payStatus,amount_paid:amountPaid,balance});
  if(!res||!res[0]){
    // Fallback: bills table may not have new columns yet — save without them
    res=await api('POST','bills',{id:billId,user_id:CU.id,customer_name:custName,customer_phone:custPhone,date:today(),items:validItems,total,profit:total-cost,notes});
    if(!res||!res[0])return alert('Failed to create invoice. Please try again.');
  }
  // Mark inventory units as sold
  for(const item of validItems){
    if(item.inv_id)await api('PATCH','inventory',{status:'Sold',sold_invoice:billId},`id=eq.${item.inv_id}`);
  }
  // Auto-add to customer ledger if partial or cleared payment
  if(amountPaid>0&&custId){
    await api('POST','customer_payments',{user_id:CU.id,customer_id:Number(custId),customer_name:custName,amount:amountPaid,payment_method:'Cash',note:`Payment on ${billId}`,date:today()});
  }
  closeModal();await loadAll();renderMain();
}

async function saveEditBill(id){
  const b=D.bills.find(x=>x.id===id);if(!b)return;
  const custName=document.getElementById('bill_cust_name')?.value?.trim()||b.customer_name;
  const custPhone=document.getElementById('bill_cust_phone')?.value?.trim()||'';
  const custId=document.getElementById('bill_cust_id')?.value||b.customer_id||null;
  const date=document.getElementById('bill_edit_date')?.value||b.date;
  const notes=document.getElementById('bill_notes')?.value?.trim()||'';
  const payStatus=document.getElementById('bill_pay_status')?.value||'Unpaid';
  // Read current prices from DOM
  billItems.forEach((item,i)=>{const el=document.getElementById(`bi_price_${i}`);if(el)item.sale_price=Number(el.value)||0;});
  const validItems=billItems.filter(item=>Number(item.sale_price)>0);
  if(validItems.length===0)return alert('Add at least 1 item with a sale price');
  const total=validItems.reduce((a,i)=>a+Number(i.sale_price),0);
  const cost=validItems.reduce((a,i)=>a+Number(i.cost_price||0),0);
  const amtPaid=payStatus==='Cleared'?total:payStatus==='Partial'?Number(document.getElementById('bill_amount_paid')?.value||0):0;
  const balance=total-amtPaid;
  // First restore previously sold items that are being removed
  const oldInvIds=(b.items||[]).map(i=>i.inv_id).filter(Boolean);
  const newInvIds=validItems.map(i=>i.inv_id).filter(Boolean);
  for(const oldId of oldInvIds){
    if(!newInvIds.includes(oldId)) await api('PATCH','inventory',{status:'Available',sold_invoice:null},`id=eq.${oldId}`);
  }
  // Mark new items as sold
  for(const item of validItems){
    if(item.inv_id&&!oldInvIds.includes(item.inv_id)) await api('PATCH','inventory',{status:'Sold',sold_invoice:id},`id=eq.${item.inv_id}`);
  }
  const res=await api('PATCH','bills',{customer_name:custName,customer_id:custId?Number(custId):null,customer_phone:custPhone,date,items:validItems,total,profit:total-cost,notes,pay_status:payStatus,amount_paid:amtPaid,balance},`id=eq.${id}`);
  if(!res)return alert('Save failed. Try again.');
  closeModal();await loadAll();renderMain();
}

async function saveEditStock(id){
  const s=D.stockPurchases.find(x=>x.id==id);if(!s)return;
  const supplier=document.getElementById('esp_supplier')?.value?.trim();
  if(!supplier)return alert('Supplier name required');
  const date=document.getElementById('esp_date')?.value;
  const pid=document.getElementById('esp_pid')?.value;
  const notes=document.getElementById('esp_notes')?.value?.trim()||'';
  const payStatus=document.getElementById('esp_pay_status')?.value||'Unpaid';
  const units=(window._editStockUnits||[]).filter(u=>u.device_id);
  const totalCost=units.reduce((a,u)=>a+Number(u.cost_price||0),0);
  const amountPaid=payStatus==='Cleared'?totalCost:payStatus==='Partial'?Number(document.getElementById('esp_amount_paid')?.value||0):0;
  const balance=totalCost-amountPaid;
  // Save purchase header with payment info
  const res=await api('PATCH','stock_purchases',{date,purchase_id:pid,supplier_name:supplier,notes,total_cost:totalCost,pay_status:payStatus,amount_paid:amountPaid,balance},`id=eq.${id}`);
  if(!res)return alert('Save failed. Try again.');
  // Delete removed units
  for(const delId of(window._editStockDeleted||[])){
    await api('DELETE','inventory',null,`id=eq.${delId}`);
  }
  // Save units: update existing, insert new
  for(const u of units){
    const dev=D.devices.find(d=>String(d.id)===String(u.device_id));
    const unitData={
      device_id:u.device_id||null,
      device_name:dev?.name||u.device_name||'',
      category:dev?.category||u.category||'',
      brand:dev?.brand||u.brand||'',
      color:u.color||'',storage:u.storage||'',
      condition:u.condition||'New',
      serial:u.serial||'',imei:u.imei||'',
      cost_price:Number(u.cost_price)||0,
      date
    };
    if(u._isNew||!u.id){
      await api('POST','inventory',{...unitData,user_id:CU.id,purchase_id:id,status:'Available'});
    } else {
      await api('PATCH','inventory',unitData,`id=eq.${u.id}`);
    }
  }
  // Sync supplier ledger entry for this purchase: delete old auto-entries, add fresh one if paid
  const oldPid=s.purchase_id||'';
  const supplierId=s.supplier_id;
  if(supplierId){
    // remove previous auto payment entries for this purchase (matched by note)
    const autoNotes=D.supplierPayments.filter(p=>p.supplier_id==supplierId&&(p.note||'').includes(oldPid)&&p.payment_method!=='Opening Balance');
    for(const p of autoNotes){await api('DELETE','supplier_payments',null,`id=eq.${p.id}`);}
    if(amountPaid>0){
      await api('POST','supplier_payments',{user_id:CU.id,supplier_id:Number(supplierId),supplier_name:supplier,amount:amountPaid,payment_method:'Cash',note:`Payment on ${pid} (${payStatus})`,date});
    }
  }
  closeModal();await loadAll();renderMain();
}

async function delBill(id){

  const b=D.bills.find(x=>x.id===id);

  await api('DELETE','bills',null,`id=eq.${id}`);
  await loadAll();renderMain();
}

      <div class="mfield"><label>DEVICE NAME *</label><input id="f_name" value="${f.name||''}" placeholder="e.g. iPhone 15 Pro"></div>
      <div class="mfield"><label>BRAND</label><input id="f_brand" value="${f.brand||'Apple'}"></div>
      <div class="mfield"><label>CATEGORY</label><select id="f_category">${['iPhone','iPad','MacBook','Android','Accessory'].map(c=>`<option${(f.category||'iPhone')===c?' selected':''}>${c}</option>`).join('')}</select></div>
      <div class="mfield"><label>BASE COST (RS.)</label><input type="number" id="f_base_cost" value="${f.base_cost||''}"></div>
    </div><div class="mfield"><label>NOTES</label><input id="f_notes" value="${f.notes||''}"></div>`;
  } else if(type==='cust'){
    title=isEdit?'Edit Customer':'Add Customer';
    body=`<div class="mfield"><label>FULL NAME *</label><input id="f_name" value="${f.name||''}"></div>
    <div class="tf">
      <div class="mfield"><label>PHONE</label><input id="f_phone" value="${f.phone||''}"></div>
      <div class="mfield"><label>EMAIL</label><input id="f_email" value="${f.email||''}"></div>
      <div class="mfield"><label>CITY</label><input id="f_city" value="${f.city||''}"></div>
      <div class="mfield"><label>TYPE</label><select id="f_type"><option${(f.type||'Retail')==='Retail'?' selected':''}>Retail</option><option${f.type==='Wholesale'?' selected':''}>Wholesale</option></select></div>
    </div>`;
  } else if(type==='supp'){
    title=isEdit?'Edit Supplier':'Add Supplier';
    body=`<div class="mfield"><label>SUPPLIER NAME *</label><input id="f_name" value="${f.name||''}"></div>
    <div class="tf">
      <div class="mfield"><label>PHONE</label><input id="f_phone" value="${f.phone||''}"></div>
      <div class="mfield"><label>EMAIL</label><input id="f_email" value="${f.email||''}"></div>
      <div class="mfield"><label>CITY</label><input id="f_city" value="${f.city||''}"></div>
    </div>`;
  } else if(type==='expense'){
    title=isEdit?'Edit Expense':'Add Expense';
    body=`<div class="tf">
      <div class="mfield"><label>DATE</label><input type="date" id="f_date" value="${f.date||td}"></div>
      <div class="mfield"><label>CATEGORY</label><select id="f_category">${['Rent','Electricity','Salary','Internet','Transport','Other'].map(c=>`<option${(f.category||'Rent')===c?' selected':''}>${c}</option>`).join('')}</select></div>
    </div>
    <div class="mfield"><label>DESCRIPTION *</label><input id="f_description" value="${f.description||''}"></div>
    <div class="mfield"><label>AMOUNT (RS.) *</label><input type="number" id="f_amount" value="${f.amount||''}"></div>`;
  } else if(type==='repair'){
    title=isEdit?'Edit Repair Job':'New Repair Job';
    body=`<div class="tf">
      <div class="mfield"><label>DATE</label><input type="date" id="f_date" value="${f.date||td}"></div>
      <div class="mfield"><label>CUSTOMER *</label><input id="f_customer" value="${f.customer||''}"></div>
      <div class="mfield"><label>PHONE</label><input id="f_phone" value="${f.phone||''}"></div>
      <div class="mfield"><label>DEVICE *</label><input id="f_device" value="${f.device||''}"></div>
    </div>
    <div class="mfield"><label>ISSUE / PROBLEM</label><input id="f_issue" value="${f.issue||''}"></div>
    <div class="mfield"><label>STATUS</label><select id="f_status">${['Pending','In Progress','Ready','Delivered'].map(s=>`<option${(f.status||'Pending')===s?' selected':''}>${s}</option>`).join('')}</select></div>
    <div class="mfield"><label>REPAIR CHARGE (RS.)</label><input type="number" id="f_charge" value="${f.charge||''}"></div>
    <div class="mfield"><label>NOTES</label><input id="f_notes" value="${f.notes||''}"></div>`;
  }
  return`<div class="modal-ov" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>${title}</h3>${body}<div class="mbtns"><button class="bsave" onclick="saveForm('${type}')">${isEdit?'Save Changes':'Add'}</button><button class="bcancel" onclick="closeModal()">Cancel</button></div></div></div>`;
}

async function saveForm(type){
  const g=id=>document.getElementById(id)?.value||'';
  const gn=id=>Number(document.getElementById(id)?.value||0);
  const uid=CU.id;
  if(!uid){alert('Session expired. Please refresh and log in again.');return;}
  let data={},table='',isEdit=ST.editId!==null;
  if(type==='device'){
    if(!g('f_name'))return alert('Device name required');
    data={user_id:uid,name:g('f_name'),brand:g('f_brand'),category:g('f_category'),base_cost:gn('f_base_cost'),notes:g('f_notes')};table='devices';
  } else if(type==='cust'){
    if(!g('f_name'))return alert('Name required');
    data={user_id:uid,name:g('f_name'),phone:g('f_phone'),email:g('f_email'),city:g('f_city'),type:g('f_type')||'Retail'};table='customers';
  } else if(type==='supp'){
    if(!g('f_name'))return alert('Name required');
    data={user_id:uid,name:g('f_name'),phone:g('f_phone'),email:g('f_email'),city:g('f_city')};table='suppliers';
  } else if(type==='expense'){
    if(!g('f_description'))return alert('Description required');
    data={user_id:uid,date:g('f_date'),category:g('f_category'),description:g('f_description'),amount:gn('f_amount')};table='expenses';
  } else if(type==='repair'){
    if(!g('f_customer')||!g('f_device'))return alert('Customer and device required');
    const jobId=isEdit?ST.form.job_id:`REP-${String(D.repairs.length+1).padStart(3,'0')}`;
    data={user_id:uid,job_id:jobId,date:g('f_date'),customer:g('f_customer'),phone:g('f_phone'),device:g('f_device'),issue:g('f_issue'),status:g('f_status'),charge:gn('f_charge'),notes:g('f_notes')};table='repairs';
  }
  if(!table){alert('Unknown form type: '+type);return;}
  const res=isEdit?await api('PATCH',table,data,`id=eq.${ST.editId}`):await api('POST',table,data);
  if(res===null){
    alert(`Save failed. Check your internet connection and try again.\n\nIf this keeps happening, try logging out and back in.`);
    return;
  }
  closeModal();await loadAll();renderMain();
}

async function delRow(table,id){
  if(!confirm('Delete this item?'))return;
  await api('DELETE',table,null,`id=eq.${id}`);
  await loadAll();renderMain();
}

async function saveSettings(){
  const g=id=>document.getElementById(id)?.value||'';const uid=CU.id;
  // Collect bank rows (only non-empty), store as JSON
  const banks=(_bankRows||[]).filter(b=>b.name||b.acc||b.title||b.iban).map(b=>({name:b.name||'',title:b.title||'',acc:b.acc||'',iban:b.iban||''}));
  // keep legacy bank1/bank2 in sync (first two) for backward compatibility
  const b1=banks[0]||{},b2=banks[1]||{};
  const data={
    company_name:g('s_company_name'),address:g('s_address'),phone:g('s_phone'),email:g('s_email'),
    banks:JSON.stringify(banks),
    bank1_name:b1.name||'',bank1_acc:b1.acc||'',bank1_title:b1.title||'',
    bank2_name:b2.name||'',bank2_acc:b2.acc||'',bank2_title:b2.title||'',
    terms:D.settings?.terms||''
  };
  const exists=await api('GET','settings',null,`user_id=eq.${uid}`);
  let res=exists&&exists.length>0?await api('PATCH','settings',data,`user_id=eq.${uid}`):await api('POST','settings',{...data,user_id:uid});
  if(res===null){
    // Fallback: 'banks' column may not exist yet — save without it
    delete data.banks;
    res=exists&&exists.length>0?await api('PATCH','settings',data,`user_id=eq.${uid}`):await api('POST','settings',{...data,user_id:uid});
    if(res===null)return alert('Save failed. Please try again.');
    alert('Settings saved (legacy mode — run the banks SQL to enable 5 banks + IBAN).');
    await loadAll();return;
  }
  await loadAll();alert('Settings saved ✓');
}

function exportExcel(){
  const rows=[['iVault Report — '+new Date().toLocaleDateString()],[],['SALES INVOICES'],['Invoice','Customer','Date','Total','Profit']];
  D.bills.forEach(b=>rows.push([b.id,b.customer_name,b.date,b.total,b.profit]));
  rows.push([],['INVENTORY'],['Device','Serial','IMEI','Color','Storage','Cost','Status']);
  D.inventory.forEach(i=>rows.push([i.device_name,i.serial||'',i.imei||'',i.color||'',i.storage||'',i.cost_price,i.status]));
  rows.push([],['EXPENSES'],['Date','Category','Description','Amount']);
  D.expenses.forEach(e=>rows.push([e.date,e.category,e.description,e.amount]));
  const rev=D.bills.reduce((a,b)=>a+Number(b.total),0);
  const prof=D.bills.reduce((a,b)=>a+Number(b.profit),0);
  const exp=D.expenses.reduce((a,e)=>a+Number(e.amount),0);
  rows.push([],['SUMMARY'],['Total Revenue',rev],['Gross Profit',prof],['Total Expenses',exp],['Net Profit',prof-exp]);
  dl('\ufeff'+rows.map(r=>r.map(c=>JSON.stringify(c??'')).join(',')).join('\n'),'text/csv',`iVault_Report_${today()}.csv`);
  alert('Exported! Open the .csv file with Excel or Google Sheets.');
}
function exportPDF(){
  const s=D.settings||{};
  const rev=D.bills.reduce((a,b)=>a+Number(b.total),0);
  const prof=D.bills.reduce((a,b)=>a+Number(b.profit),0);
  const exp=D.expenses.reduce((a,e)=>a+Number(e.amount),0);
  const net=prof-exp;
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>iVault Report</title><style>body{font-family:sans-serif;padding:28px;max-width:750px;margin:auto;color:#111}h1{color:#f97316}h2{font-size:14px;margin:18px 0 7px;border-bottom:2px solid #eee;padding-bottom:4px}table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px}th{background:#f5f5f5;text-align:left;padding:6px 7px;font-size:10px}td{padding:6px 7px;border-bottom:1px solid #f0f0f0}.summary{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}.scard{background:#f9f9f9;border-radius:8px;padding:12px}.l{font-size:10px;color:#888}.v{font-size:18px;font-weight:800;margin-top:4px}.green{color:#16a34a}.red{color:#dc2626}</style></head><body>
  <h1>🔐 iVault — Business Report</h1><div style="font-size:11px;color:#888">${s.company_name||''} · ${new Date().toLocaleDateString()}</div>
  <h2>Summary</h2><div class="summary"><div class="scard"><div class="l">Revenue</div><div class="v green">Rs. ${rev.toLocaleString()}</div></div><div class="scard"><div class="l">Gross Profit</div><div class="v green">Rs. ${prof.toLocaleString()}</div></div><div class="scard"><div class="l">Expenses</div><div class="v red">Rs. ${exp.toLocaleString()}</div></div><div class="scard"><div class="l">Net Profit</div><div class="v ${net>=0?'green':'red'}">Rs. ${net.toLocaleString()}</div></div></div>
  <h2>Sales</h2><table><thead><tr><th>Invoice</th><th>Customer</th><th>Date</th><th>Revenue</th><th>Profit</th></tr></thead><tbody>${D.bills.map(b=>`<tr><td>${b.id}</td><td>${b.customer_name}</td><td>${b.date}</td><td>Rs. ${Number(b.total).toLocaleString()}</td><td>Rs. ${Number(b.profit).toLocaleString()}</td></tr>`).join('')}</tbody></table>
  <h2>Inventory</h2><table><thead><tr><th>Device</th><th>Serial</th><th>IMEI</th><th>Cost</th><th>Status</th></tr></thead><tbody>${D.inventory.map(i=>`<tr><td>${i.device_name}</td><td>${i.serial||'—'}</td><td>${i.imei||'—'}</td><td>Rs. ${Number(i.cost_price).toLocaleString()}</td><td>${i.status}</td></tr>`).join('')}</tbody></table>
  <script>window.print();setTimeout(()=>window.close(),2000);<\/script></body></html>`);
  w.document.close();
}
